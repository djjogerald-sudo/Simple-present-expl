<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Simple Present</title>
<style>
/* ── exact uploaded design ── */
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:system-ui,sans-serif;background:#f7f9fc;color:#1a1a2e;padding:1.5rem}
.app{max-width:780px;margin:0 auto}
h1{font-size:20px;font-weight:600;color:#1a1a2e;margin-bottom:4px}
.subtitle{font-size:13px;color:#666;margin-bottom:1.25rem}
.score-pill{display:inline-flex;gap:14px;background:#e8f0fe;border-radius:20px;padding:6px 16px;margin-bottom:1.25rem}
.score-pill span{font-size:13px;color:#3a5a9a}
.score-pill strong{font-weight:600;color:#1a3a7a}
.streak-msg{font-size:12px;color:#2d7a4a;font-weight:600;margin-left:3px}
.tabs{display:flex;gap:0;border-radius:10px;overflow:hidden;border:1px solid #d0d8f0;margin-bottom:1.25rem;background:#fff}
.tab{flex:1;padding:9px 8px;border:none;background:transparent;font-size:13px;cursor:pointer;color:#666;font-family:inherit;transition:all .15s;text-align:center}
.tab.on{background:#3a5a9a;color:#fff;font-weight:500}
.prog-bar{height:4px;background:#dde5f5;border-radius:2px;margin-bottom:1.25rem;overflow:hidden}
.prog-fill{height:100%;background:#3a5a9a;border-radius:2px;transition:width .4s}

/* page fade animation */
@keyframes fadeL{from{opacity:0;transform:translateX(30px)}to{opacity:1;transform:translateX(0)}}
@keyframes fadeR{from{opacity:0;transform:translateX(-30px)}to{opacity:1;transform:translateX(0)}}
.fl{animation:fadeL .3s cubic-bezier(.4,0,.2,1) both}
.fr{animation:fadeR .3s cubic-bezier(.4,0,.2,1) both}

/* EXPLORE */
.tense-note{background:#e8f0fe;border-radius:8px;padding:10px 14px;font-size:13px;color:#3a5a9a;margin-bottom:1rem;line-height:1.6}
.tense-note b{font-weight:600;color:#1a3a7a}
.subj-row{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:1rem;align-items:center}
.subj-row label{font-size:12px;color:#888}
.sbtn{padding:5px 12px;border-radius:20px;border:1px solid #d0d8f0;background:#fff;font-size:13px;cursor:pointer;color:#666;transition:all .15s;font-family:inherit}
.sbtn.on{background:#3a5a9a;color:#fff;border-color:#3a5a9a}

/* big form card */
.fbox-big{padding:20px 18px;border-radius:10px;margin-bottom:1rem}
.fbox-big.p{background:#e6f4ea;border:1px solid #a8d5b5}
.fbox-big.n{background:#fce8e6;border:1px solid #f5a89e}
.fbox-big.q{background:#e8f0fe;border:1px solid #a8bef5}
.flabel{font-size:10px;font-weight:600;letter-spacing:.8px;text-transform:uppercase;margin-bottom:8px}
.fbox-big.p .flabel{color:#2d7a4a}
.fbox-big.n .flabel{color:#c0392b}
.fbox-big.q .flabel{color:#2a4fa8}
.fex-big{font-size:24px;font-weight:700;margin-bottom:6px;line-height:1.3;color:#1a1a2e}
.fstr{font-size:11px;color:#888}

/* all-subjects mini grid */
.all-grid{display:grid;grid-template-columns:repeat(5,minmax(0,1fr));gap:8px;margin-bottom:1rem}
.sc{padding:10px 4px;border-radius:8px;text-align:center;cursor:pointer;transition:all .15s;border:1px solid transparent}
.sc.p{background:#e6f4ea;border-color:#a8d5b5}
.sc.n{background:#fce8e6;border-color:#f5a89e}
.sc.q{background:#e8f0fe;border-color:#a8bef5}
.sc.active{transform:scale(1.06);box-shadow:0 2px 10px rgba(0,0,0,.1)}
.sc.dim{opacity:.52}
.sc-name{font-size:9px;font-weight:600;letter-spacing:.5px;text-transform:uppercase;margin-bottom:3px}
.sc.p .sc-name{color:#2d7a4a}
.sc.n .sc-name{color:#c0392b}
.sc.q .sc-name{color:#2a4fa8}
.sc-sent{font-size:11px;font-weight:600;color:#1a1a2e;line-height:1.3}

.rule-box{background:#fff8e6;border:1px solid #f0d080;border-radius:8px;padding:10px 14px;font-size:13px;color:#7a5a00;line-height:1.7;margin-bottom:1rem}
.rule-box b{font-weight:600;color:#5a4000}
.tip{background:#fff;border-left:3px solid #f5a623;border-radius:0 8px 8px 0;padding:9px 14px;font-size:13px;color:#7a5000;line-height:1.6;margin-bottom:1rem}
.tip b{font-weight:600}
.btn-row{display:flex;gap:8px;flex-wrap:wrap}
.btn{padding:7px 16px;border-radius:8px;border:1px solid #d0d8f0;background:#fff;font-size:13px;cursor:pointer;color:#1a1a2e;transition:all .15s;font-family:inherit}
.btn:hover:not(:disabled){background:#e8f0fe;border-color:#a8bef5}
.btn.pri{background:#3a5a9a;color:#fff;border-color:#3a5a9a}
.btn.pri:hover:not(:disabled){background:#2d4a8a}
.btn:disabled{opacity:.4;cursor:default}

/* QUIZ */
.qcard{background:#fff;border:1px solid #d0d8f0;border-radius:12px;padding:1.25rem;margin-bottom:1rem}
.qtag{display:inline-block;padding:3px 10px;border-radius:20px;font-size:11px;font-weight:600;margin-bottom:10px}
.qtag.p{background:#e6f4ea;color:#2d7a4a}
.qtag.n{background:#fce8e6;color:#c0392b}
.qtag.q{background:#e8f0fe;color:#2a4fa8}
.qprompt{font-size:15px;color:#1a1a2e;margin-bottom:14px;line-height:1.6}
.opts{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:8px}
.opt{padding:11px 14px;border-radius:8px;border:1px solid #d0d8f0;background:#fff;font-size:14px;cursor:pointer;color:#1a1a2e;transition:all .15s;text-align:left;font-family:inherit;width:100%}
.opt:hover:not(:disabled){background:#e8f0fe}
.opt.ok{background:#e6f4ea;border-color:#a8d5b5;color:#2d7a4a;font-weight:500}
.opt.bad{background:#fce8e6;border-color:#f5a89e;color:#c0392b}
.fb{margin-top:10px;padding:9px 14px;border-radius:8px;font-size:13px;line-height:1.6}
.fb.ok{background:#e6f4ea;color:#2d7a4a}
.fb.err{background:#fce8e6;color:#c0392b}

/* TRANSFORM */
.tcard{background:#fff;border:1px solid #d0d8f0;border-radius:12px;padding:1.25rem;margin-bottom:1rem}
.src{background:#f0f4ff;border-radius:8px;padding:10px 14px;font-size:15px;color:#1a1a2e;margin-bottom:12px;font-weight:500}
.tinput{width:100%;padding:10px 12px;border-radius:8px;border:1px solid #c0c8e8;background:#fff;font-size:14px;color:#1a1a2e;outline:none;font-family:inherit;display:block;margin-bottom:10px;transition:border-color .15s,box-shadow .15s}
.tinput:focus{border-color:#3a5a9a;box-shadow:0 0 0 3px rgba(58,90,154,.1)}
.tinput:disabled{opacity:.55}

/* BUILD */
.word-bank{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:14px;min-height:42px;padding:10px;background:#f7f9fc;border-radius:8px;border:1px dashed #c0c8e8}
.built-zone{display:flex;flex-wrap:wrap;gap:8px;min-height:42px;padding:10px;border-radius:8px;border:1.5px dashed #a8bef5;margin-bottom:12px;background:#f0f4ff}

/* PAGE NAV */
.page-nav{display:flex;align-items:center;justify-content:space-between;margin-top:1.5rem;padding-top:1rem;border-top:1px solid #e8edf5}
.nav-dots{display:flex;gap:7px;align-items:center}
.ndot{width:8px;height:8px;border-radius:50%;background:#d0d8f0;cursor:pointer;border:none;padding:0;transition:all .2s}
.ndot.on{background:#3a5a9a;transform:scale(1.35)}
.ndot.done{background:#a8bef5}

/* WALKTHROUGH */
#wt-back{position:fixed;inset:0;background:rgba(20,30,60,.45);z-index:1000}
#wt-hl{position:fixed;z-index:1001;border-radius:10px;box-shadow:0 0 0 4px #3a5a9a,0 0 0 8px rgba(58,90,154,.25);pointer-events:none;transition:all .3s}
#wt-hand{position:fixed;z-index:1003;font-size:26px;pointer-events:none;animation:wbob .8s ease-in-out infinite alternate}
@keyframes wbob{from{transform:translateY(0) rotate(-12deg)}to{transform:translateY(-7px) rotate(-12deg)}}
#wt-bubble{position:fixed;z-index:1002;background:#fff;border-radius:12px;padding:16px 18px;max-width:255px;box-shadow:0 6px 24px rgba(0,0,0,.15)}
#wt-bubble h3{font-size:14px;font-weight:600;color:#1a1a2e;margin-bottom:6px}
#wt-bubble p{font-size:13px;color:#555;line-height:1.6;margin-bottom:12px}
.wt-btns{display:flex;gap:8px;align-items:center}
.wt-next{padding:6px 14px;border-radius:8px;background:#3a5a9a;color:#fff;border:none;font-size:13px;cursor:pointer;font-family:inherit;font-weight:500}
.wt-skip{padding:6px 10px;background:transparent;color:#999;border:none;font-size:12px;cursor:pointer;font-family:inherit}
.wt-dots-row{display:flex;gap:5px;margin-left:auto}
.wt-d{width:6px;height:6px;border-radius:50%;background:#ddd}
.wt-d.on{background:#3a5a9a}
</style>
</head>
<body>
<div class="app">
  <h1>Simple present tense</h1>
  <p class="subtitle">Positive, negative and question forms — A1 level</p>
  <div class="score-pill">
    <span>Score <strong id="sc">0</strong></span>
    <span>Streak <strong id="st">0</strong><span class="streak-msg" id="stmsg"></span></span>
  </div>
  <div class="tabs" id="tabs"></div>
  <div class="prog-bar"><div class="prog-fill" id="prog" style="width:0%"></div></div>
  <div id="pw"></div>
</div>

<div id="wt-back"   style="display:none" onclick="wtSkip()"></div>
<div id="wt-hl"    style="display:none"></div>
<div id="wt-hand"  style="display:none">👆</div>
<div id="wt-bubble" style="display:none">
  <h3 id="wt-title"></h3>
  <p  id="wt-text"></p>
  <div class="wt-btns">
    <button class="wt-next" onclick="wtNext()">Next →</button>
    <button class="wt-skip" onclick="wtSkip()">Skip</button>
    <div class="wt-dots-row" id="wt-dots"></div>
  </div>
</div>

<script>
/* ── DATA ── */
const VERBS=[
  {b:'work',s:'works'},{b:'play',s:'plays'},{b:'eat',s:'eats'},{b:'drink',s:'drinks'},
  {b:'study',s:'studies'},{b:'watch',s:'watches'},{b:'cook',s:'cooks'},{b:'walk',s:'walks'},
  {b:'sleep',s:'sleeps'},{b:'read',s:'reads'},{b:'listen',s:'listens'},{b:'help',s:'helps'},
  {b:'call',s:'calls'},{b:'open',s:'opens'},{b:'wash',s:'washes'},{b:'visit',s:'visits'},
  {b:'learn',s:'learns'},{b:'talk',s:'talks'},{b:'live',s:'lives'},{b:'run',s:'runs'},
];
const SUBJS=['I','you','he','we','they'];
const posF=(s,v)=>s==='he'?`${s} ${v.s}`:`${s} ${v.b}`;
const negF=(s,v)=>s==='he'?`${s} doesn't ${v.b}`:`${s} don't ${v.b}`;
const queF=(s,v)=>s==='he'?`Does ${s} ${v.b}?`:`Do ${s} ${v.b}?`;
const spF =s=>s==='he'?'he/she + verb-s':'subject + verb';
const snF =s=>s==='he'?"he/she + doesn't + verb":"subject + don't + verb";
const sqF =s=>s==='he'?'Does + he/she + verb?':'Do + subject + verb?';
const TIPS={
  I:'<b>I</b> never adds -s. Say <b>I work</b>, NOT <b>I works</b>.',
  you:'<b>You</b> never adds -s. Say <b>you work</b>, NOT <b>you works</b>.',
  he:'<b>He/she/it</b> always gets <b>-s</b>! Say <b>he works</b>. But in negatives: <b>he doesn\'t work</b> — no -s after doesn\'t!',
  we:'<b>We</b> never adds -s. Say <b>we work</b>, NOT <b>we works</b>.',
  they:'<b>They</b> never adds -s. Say <b>they work</b>, NOT <b>they works</b>.',
};
const RULES={
  I:'<b>Positive:</b> I + verb &nbsp;|&nbsp; <b>Negative:</b> I + don\'t + verb &nbsp;|&nbsp; <b>Question:</b> Do + I + verb?',
  you:'<b>Positive:</b> you + verb &nbsp;|&nbsp; <b>Negative:</b> you + don\'t + verb &nbsp;|&nbsp; <b>Question:</b> Do + you + verb?',
  he:'<b>Positive:</b> he/she + verb-s &nbsp;|&nbsp; <b>Negative:</b> he/she + doesn\'t + verb &nbsp;|&nbsp; <b>Question:</b> Does + he/she + verb?',
  we:'<b>Positive:</b> we + verb &nbsp;|&nbsp; <b>Negative:</b> we + don\'t + verb &nbsp;|&nbsp; <b>Question:</b> Do + we + verb?',
  they:'<b>Positive:</b> they + verb &nbsp;|&nbsp; <b>Negative:</b> they + don\'t + verb &nbsp;|&nbsp; <b>Question:</b> Do + they + verb?',
};
const rand=a=>a[Math.floor(Math.random()*a.length)];
const norm=s=>s.toLowerCase().replace(/[?.!]/g,'').trim();

const PAGES=[
  {id:'positive', label:'Positive ✚'},
  {id:'negative', label:'Negative −'},
  {id:'question', label:'Question ?'},
  {id:'quiz',     label:'Quiz'},
  {id:'transform',label:'Transform'},
  {id:'build',    label:'Build'},
];

let curPage=0, curS='I', curV=VERBS[0];
let score=0, streak=0, totalAns=0;

function updScore(){
  document.getElementById('sc').textContent=score;
  document.getElementById('st').textContent=streak;
  document.getElementById('stmsg').textContent=streak>=5?' 🔥':streak>=3?' 👏':'';
  const pct=totalAns>0?Math.min(100,Math.round(score/totalAns*100)):0;
  document.getElementById('prog').style.width=pct+'%';
}
function onScore(ok){totalAns++;if(ok){score++;streak++;}else streak=0;updScore();}

/* ── TABS ── */
function buildTabs(){
  document.getElementById('tabs').innerHTML=PAGES.map((p,i)=>
    `<button class="tab${i===curPage?' on':''}" onclick="goPage(${i},${i>curPage?1:-1})">${p.label}</button>`
  ).join('');
}

/* ── NAV ── */
function navHTML(){
  const dots=PAGES.map((p,i)=>`<button class="ndot${i===curPage?' on':i<curPage?' done':''}" onclick="goPage(${i},${i>curPage?1:-1})" title="${p.label}"></button>`).join('');
  return `<div class="page-nav">
    <button class="btn"${curPage===0?' disabled':''} onclick="goPage(${curPage-1},-1)">← Back</button>
    <div class="nav-dots">${dots}</div>
    <button class="btn pri"${curPage===PAGES.length-1?' disabled':''} onclick="goPage(${curPage+1},1)">Next →</button>
  </div>`;
}

/* ── ROUTING ── */
function goPage(idx,dir){
  if(idx<0||idx>=PAGES.length)return;
  curPage=idx; buildTabs(); render(dir===undefined?1:dir);
}

function render(dir){
  const pw=document.getElementById('pw');
  const div=document.createElement('div');
  const pid=PAGES[curPage].id;
  if(['positive','negative','question'].includes(pid)) div.innerHTML=exploreHTML(pid);
  else if(pid==='quiz')       div.innerHTML=quizHTML();
  else if(pid==='transform')  div.innerHTML=transformHTML();
  else                        div.innerHTML=buildHTML();
  pw.innerHTML=''; pw.appendChild(div);
  requestAnimationFrame(()=>div.classList.add(dir>=0?'fl':'fr'));
  if(pid==='quiz')      bindQuiz();
  if(pid==='transform') bindTransform();
  if(pid==='build')     bindBuild();
}

/* ── EXPLORE ── */
function exploreHTML(form){
  const cls  = form==='positive'?'p':form==='negative'?'n':'q';
  const label= form==='positive'?'Positive':form==='negative'?'Negative':'Question';
  const mainEx  = form==='positive'?posF(curS,curV):form==='negative'?negF(curS,curV):queF(curS,curV);
  const mainStr = form==='positive'?spF(curS):form==='negative'?snF(curS):sqF(curS);
  const note =
    form==='positive'?'<b>Simple present — positive:</b> habits, routines and facts. <b>He/she/it</b> gets a special <b>-s</b> ending!':
    form==='negative'?'<b>Simple present — negative:</b> use <b>don\'t</b> (I/you/we/they) or <b>doesn\'t</b> (he/she/it) + base verb.':
    '<b>Simple present — question:</b> use <b>Do</b> (I/you/we/they) or <b>Does</b> (he/she/it) before the subject.';
  const sbtns=SUBJS.map(s=>
    `<button class="sbtn${s===curS?' on':''}" onclick="setSubj('${s}','${form}')">${s==='he'?'he / she':s}</button>`
  ).join('');
  const grid=SUBJS.map(s=>{
    const ex=form==='positive'?posF(s,curV):form==='negative'?negF(s,curV):queF(s,curV);
    return `<div class="sc ${cls}${s===curS?' active':' dim'}" onclick="setSubj('${s}','${form}')">
      <div class="sc-name">${s==='he'?'he/she':s}</div>
      <div class="sc-sent">${ex}</div>
    </div>`;
  }).join('');
  return `
    <div class="tense-note">${note}</div>
    <div class="subj-row"><label>Subject:</label>${sbtns}</div>
    <div class="fbox-big ${cls}">
      <div class="flabel">${label}</div>
      <div class="fex-big">${mainEx}</div>
      <div class="fstr">${mainStr}</div>
    </div>
    <div class="all-grid">${grid}</div>
    <div class="rule-box">${RULES[curS]}</div>
    <div class="tip">${TIPS[curS]}</div>
    <div class="btn-row"><button class="btn" onclick="newVerb('${form}')">New verb 🎲</button></div>
    ${navHTML()}`;
}
function setSubj(s,form){ curS=s; render(0); }
function newVerb(form){ curV=rand(VERBS); render(0); }

/* ── QUIZ ── */
let qState={};
function quizHTML(){
  const s=rand(SUBJS),v=rand(VERBS),ft=rand(['pos','neg','q']);
  const correct=ft==='pos'?posF(s,v):ft==='neg'?negF(s,v):queF(s,v);
  let ws=new Set();
  while(ws.size<3){
    const w=ft==='pos'?posF(rand(SUBJS),rand(VERBS)):ft==='neg'?negF(rand(SUBJS),rand(VERBS)):queF(rand(SUBJS),rand(VERBS));
    if(w!==correct)ws.add(w);
  }
  const opts=[correct,...ws].sort(()=>Math.random()-.5);
  qState={correct};
  const cls=ft==='pos'?'p':ft==='neg'?'n':'q';
  const lbl=ft==='pos'?'positive':ft==='neg'?'negative':'question';
  return `<div class="qcard">
    <span class="qtag ${cls}">${lbl}</span>
    <div class="qprompt">Make the <b>${lbl}</b> form of <b>"${v.b}"</b> with subject <b>"${s}"</b>:</div>
    <div class="opts" id="qopts">
      ${opts.map(o=>`<button class="opt" data-o="${o.replace(/"/g,'&quot;')}">${o}</button>`).join('')}
    </div>
    <div id="qfb"></div>
  </div>
  <div id="qnr" style="display:none;margin-top:4px">
    <button class="btn pri" onclick="render(1)">Next question →</button>
  </div>
  ${navHTML()}`;
}
function bindQuiz(){
  document.querySelectorAll('.opt').forEach(b=>{
    b.addEventListener('click',function(){
      if(document.querySelector('.opt.ok,.opt.bad'))return;
      const chosen=this.dataset.o,{correct}=qState;
      document.querySelectorAll('.opt').forEach(x=>{
        x.disabled=true;
        if(x.dataset.o===correct)x.classList.add('ok');
        else if(x===this&&chosen!==correct)x.classList.add('bad');
      });
      const fb=document.getElementById('qfb');
      if(chosen===correct){fb.className='fb ok';fb.textContent='Well done! Correct!';onScore(true);}
      else{fb.className='fb err';fb.innerHTML=`Not quite — the answer is: <b>${correct}</b>`;onScore(false);}
      document.getElementById('qnr').style.display='block';
    });
  });
}

/* ── TRANSFORM ── */
let trState={};
function transformHTML(){
  const s=rand(SUBJS),v=rand(VERBS);
  const tasks=[
    {from:'positive',to:'negative',src:posF(s,v),ans:negF(s,v),hint:snF(s)},
    {from:'positive',to:'question',src:posF(s,v),ans:queF(s,v),hint:sqF(s)},
    {from:'negative',to:'positive',src:negF(s,v),ans:posF(s,v),hint:spF(s)},
    {from:'question',to:'positive',src:queF(s,v),ans:posF(s,v),hint:spF(s)},
  ];
  const t=rand(tasks); trState={ans:t.ans,hint:t.hint};
  const tc=f=>f==='positive'?'p':f==='negative'?'n':'q';
  return `<div class="tcard">
    <p style="font-size:12px;color:#888;margin-bottom:8px">
      Change <span class="qtag ${tc(t.from)}">${t.from}</span> → <span class="qtag ${tc(t.to)}">${t.to}</span>
    </p>
    <div class="src">${t.src}</div>
    <input id="tri" class="tinput" placeholder="Write the ${t.to} form…">
    <div class="btn-row">
      <button class="btn pri" id="trck">Check</button>
      <button class="btn" id="trht">Hint</button>
      <button class="btn" id="trnw" style="display:none">New sentence →</button>
    </div>
    <div id="trhb" style="display:none;margin-top:8px;font-size:12px;color:#888">Structure: <b>${t.hint}</b></div>
    <div id="trfb"></div>
  </div>
  ${navHTML()}`;
}
function bindTransform(){
  const inp=document.getElementById('tri');
  setTimeout(()=>inp&&inp.focus(),60);
  document.getElementById('trck').addEventListener('click',()=>{
    const v=inp.value.trim(); if(!v||inp.disabled)return;
    inp.disabled=true;
    const ok=norm(v)===norm(trState.ans);
    const fb=document.getElementById('trfb');
    fb.style.marginTop='8px';
    if(ok){fb.className='fb ok';fb.textContent='Excellent! Correct!';onScore(true);}
    else{fb.className='fb err';fb.innerHTML=`Not quite. Answer: <b>${trState.ans}</b><br><small>Structure: ${trState.hint}</small>`;onScore(false);}
    document.getElementById('trnw').style.display='inline-block';
  });
  inp.addEventListener('keydown',e=>{if(e.key==='Enter')document.getElementById('trck').click();});
  document.getElementById('trht').addEventListener('click',()=>{document.getElementById('trhb').style.display='block';});
  document.getElementById('trnw').addEventListener('click',()=>render(1));
}

/* ── BUILD ── */
let bldState={};
function buildHTML(){
  const s=rand(SUBJS),v=rand(VERBS),ft=rand(['pos','neg','q']);
  const correct=ft==='pos'?posF(s,v):ft==='neg'?negF(s,v):queF(s,v);
  bldState={correct,isQ:ft==='q'};
  const words=correct.replace('?','').split(' ');
  const sc=[...words].sort(()=>Math.random()-.5);
  const cls=ft==='pos'?'p':ft==='neg'?'n':'q';
  const lbl=ft==='pos'?'positive':ft==='neg'?'negative':'question';
  return `<div class="tcard">
    <p style="font-size:13px;color:#888;margin-bottom:10px">
      Put the words in order — make a <span class="qtag ${cls}">${lbl}</span> sentence:
    </p>
    <div class="word-bank" id="bbnk">
      ${sc.map((w,i)=>`<button class="btn" data-i="${i}" data-w="${w}" style="font-size:14px;padding:5px 11px">${w}</button>`).join('')}
    </div>
    <p style="font-size:12px;color:#888;margin-bottom:6px">Your sentence:</p>
    <div class="built-zone" id="bblt"></div>
    <div class="btn-row">
      <button class="btn pri" id="bchk">Check</button>
      <button class="btn" id="bclr">Clear</button>
      <button class="btn" id="bnew">New 🎲</button>
    </div>
    <div id="bfb"></div>
  </div>
  ${navHTML()}`;
}
function bindBuild(){
  document.getElementById('bbnk').addEventListener('click',e=>{
    const b=e.target.closest('button');
    if(!b||b.disabled||document.getElementById('bfb').textContent)return;
    b.disabled=true; b.style.opacity='.3';
    const pl=document.createElement('button');
    pl.className='btn'; pl.textContent=b.dataset.w;
    pl.style.cssText='font-size:14px;padding:5px 11px;background:#e8f0fe;border-color:#a8bef5';
    pl.onclick=()=>{
      if(document.getElementById('bfb').textContent)return;
      pl.remove(); b.disabled=false; b.style.opacity='1';
    };
    document.getElementById('bblt').appendChild(pl);
  });
  document.getElementById('bchk').addEventListener('click',()=>{
    const built=[...document.getElementById('bblt').querySelectorAll('button')].map(b=>b.textContent).join(' ');
    if(!built)return;
    const ans=built+(bldState.isQ?'?':'');
    const ok=norm(ans)===norm(bldState.correct);
    const fb=document.getElementById('bfb'); fb.style.marginTop='8px';
    if(ok){fb.className='fb ok';fb.textContent='Perfect! Well done!';onScore(true);}
    else{fb.className='fb err';fb.innerHTML=`Not quite. Correct: <b>${bldState.correct}</b>`;onScore(false);}
  });
  document.getElementById('bclr').addEventListener('click',()=>{
    if(document.getElementById('bfb').textContent)return;
    [...document.getElementById('bblt').querySelectorAll('button')].forEach(b=>b.click());
  });
  document.getElementById('bnew').addEventListener('click',()=>render(1));
}

/* ── WALKTHROUGH ── */
const WT=[
  {sel:'.tense-note', t:'What you\'re learning',  txt:'This note tells you when to use this form. Always read it first!'},
  {sel:'.subj-row',   t:'Change the subject',      txt:'Tap I, you, he/she, we or they. He/she/it is special — it always gets -s!'},
  {sel:'.fbox-big',   t:'The main form',           txt:'This large card shows the sentence for the subject and verb you selected.'},
  {sel:'.all-grid',   t:'All subjects at once',    txt:'These 5 cards show every subject together. Tap any to switch.'},
  {sel:'.rule-box',   t:'Grammar rule',            txt:'The exact rule for the selected subject. Read it carefully!'},
  {sel:'.tip',        t:'Common mistake!',         txt:'The most important thing to remember. Many beginners get this wrong!'},
  {sel:'.page-nav',   t:'Navigate the pages',      txt:'Use Next/Back or the dots to move between Positive, Negative, Question, Quiz, Transform and Build.'},
];
let wtStep=0;
function wtStart(){
  document.getElementById('wt-back').style.display='block';
  document.getElementById('wt-dots').innerHTML=WT.map((_,i)=>`<div class="wt-d" id="wd${i}"></div>`).join('');
  wtShow(0);
}
function wtShow(i){
  wtStep=i;
  const step=WT[i], el=document.querySelector(step.sel);
  if(!el){wtNext();return;}
  document.querySelectorAll('.wt-d').forEach((d,j)=>d.classList.toggle('on',j===i));
  document.getElementById('wt-title').textContent=step.t;
  document.getElementById('wt-text').textContent=step.txt;
  document.querySelector('.wt-next').textContent=i===WT.length-1?'Got it!':'Next →';
  const r=el.getBoundingClientRect(),pad=8;
  document.getElementById('wt-hl').style.cssText=
    `display:block;position:fixed;left:${r.left-pad}px;top:${r.top-pad}px;`+
    `width:${r.width+pad*2}px;height:${r.height+pad*2}px;border-radius:10px;`+
    `box-shadow:0 0 0 4px #3a5a9a,0 0 0 8px rgba(58,90,154,.25);pointer-events:none;z-index:1001`;
  document.getElementById('wt-hand').style.cssText=
    `display:block;position:fixed;left:${r.left+12}px;top:${r.bottom+4}px;font-size:26px;z-index:1003;pointer-events:none`;
  const bub=document.getElementById('wt-bubble'); bub.style.display='block';
  let bx=r.left,by=r.bottom+48;
  if(bx+260>window.innerWidth-10)bx=window.innerWidth-270;if(bx<10)bx=10;
  if(by+165>window.innerHeight-10)by=r.top-172;if(by<10)by=10;
  bub.style.cssText=`display:block;position:fixed;left:${bx}px;top:${by}px;z-index:1002;`+
    `background:#fff;border-radius:12px;padding:16px 18px;max-width:255px;box-shadow:0 6px 24px rgba(0,0,0,.15)`;
}
function wtNext(){if(wtStep>=WT.length-1){wtSkip();return;}wtShow(wtStep+1);}
function wtSkip(){
  ['wt-back','wt-hl','wt-hand','wt-bubble'].forEach(id=>{
    const el=document.getElementById(id);if(el)el.style.display='none';
  });
}

/* ── INIT ── */
buildTabs(); render(1); setTimeout(wtStart,600);
</script>
