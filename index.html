<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Simple Present Tense</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
html,body{width:100%;height:100%;font-family:system-ui,sans-serif;background:#f7f9fc;color:#1a1a2e}

/* ══════════════════════
   MOBILE
══════════════════════ */
body.mobile{padding:1.2rem;overflow-y:auto;overflow-x:hidden}
.mobile .app{max-width:700px;margin:0 auto}
.mobile h1{font-size:19px;font-weight:600;color:#1a1a2e;margin-bottom:3px}
.mobile .subtitle{font-size:12px;color:#666;margin-bottom:1rem}
.mobile .score-pill{display:inline-flex;gap:12px;background:#e8f0fe;border-radius:20px;padding:5px 14px;margin-bottom:1rem}
.mobile .score-pill span{font-size:12px;color:#3a5a9a}
.mobile .score-pill strong{font-weight:600;color:#1a3a7a}
.mobile .streak-msg{font-size:11px;color:#2d7a4a;font-weight:600;margin-left:2px}
.mobile .tabs{display:flex;border-radius:10px;overflow:hidden;border:1px solid #d0d8f0;margin-bottom:1rem;background:#fff}
.mobile .tab{flex:1;padding:8px 4px;border:none;background:transparent;font-size:12px;cursor:pointer;color:#666;font-family:inherit;transition:all .15s;text-align:center}
.mobile .tab.on{background:#3a5a9a;color:#fff;font-weight:500}
.mobile .prog-bar{height:3px;background:#dde5f5;border-radius:2px;margin-bottom:1rem;overflow:hidden}
.mobile .prog-fill{height:100%;background:#3a5a9a;border-radius:2px;transition:width .4s}
.mobile .tense-note{background:#e8f0fe;border-radius:8px;padding:8px 12px;font-size:12px;color:#3a5a9a;margin-bottom:.85rem;line-height:1.55}
.mobile .tense-note b{font-weight:600;color:#1a3a7a}
.mobile .subj-row{display:flex;gap:5px;flex-wrap:wrap;margin-bottom:.85rem;align-items:center}
.mobile .subj-row label{font-size:11px;color:#888}
.mobile .sbtn{padding:4px 10px;border-radius:20px;border:1px solid #d0d8f0;background:#fff;font-size:12px;cursor:pointer;color:#666;font-family:inherit;transition:all .15s}
.mobile .sbtn.on{background:#3a5a9a;color:#fff;border-color:#3a5a9a}
.mobile .fbox-big{padding:14px 16px;border-radius:10px;margin-bottom:.85rem}
.mobile .fbox-big.p{background:#e6f4ea;border:1px solid #a8d5b5}
.mobile .fbox-big.n{background:#fce8e6;border:1px solid #f5a89e}
.mobile .fbox-big.q{background:#e8f0fe;border:1px solid #a8bef5}
.mobile .flabel{font-size:9px;font-weight:600;letter-spacing:.8px;text-transform:uppercase;margin-bottom:6px}
.mobile .fbox-big.p .flabel{color:#2d7a4a}
.mobile .fbox-big.n .flabel{color:#c0392b}
.mobile .fbox-big.q .flabel{color:#2a4fa8}
.mobile .fex-big{font-size:22px;font-weight:700;margin-bottom:4px;line-height:1.3;color:#1a1a2e}
.mobile .fstr{font-size:11px;color:#888}
.mobile .all-grid{display:grid;grid-template-columns:repeat(5,minmax(0,1fr));gap:6px;margin-bottom:.85rem}
.mobile .sc{padding:8px 3px;border-radius:8px;text-align:center;cursor:pointer;transition:all .15s;border:1px solid transparent}
.mobile .sc.p{background:#e6f4ea;border-color:#a8d5b5}
.mobile .sc.n{background:#fce8e6;border-color:#f5a89e}
.mobile .sc.q{background:#e8f0fe;border-color:#a8bef5}
.mobile .sc.active{transform:scale(1.05);box-shadow:0 2px 8px rgba(0,0,0,.1)}
.mobile .sc.dim{opacity:.52}
.mobile .sc-name{font-size:9px;font-weight:600;letter-spacing:.5px;text-transform:uppercase;margin-bottom:2px}
.mobile .sc.p .sc-name{color:#2d7a4a}
.mobile .sc.n .sc-name{color:#c0392b}
.mobile .sc.q .sc-name{color:#2a4fa8}
.mobile .sc-sent{font-size:10px;font-weight:600;color:#1a1a2e;line-height:1.3}
.mobile .tip{background:#fff;border-left:3px solid #f5a623;border-radius:0 8px 8px 0;padding:7px 12px;font-size:12px;color:#7a5000;line-height:1.5;margin-bottom:.85rem}
.mobile .tip b{font-weight:600}
.mobile .btn-row{display:flex;gap:7px;flex-wrap:wrap}
.mobile .btn{padding:6px 14px;border-radius:8px;border:1px solid #d0d8f0;background:#fff;font-size:12px;cursor:pointer;color:#1a1a2e;font-family:inherit;transition:all .15s}
.mobile .btn:hover:not(:disabled){background:#e8f0fe;border-color:#a8bef5}
.mobile .btn.pri{background:#3a5a9a;color:#fff;border-color:#3a5a9a}
.mobile .btn.pri:hover:not(:disabled){background:#2d4a8a}
.mobile .btn:disabled{opacity:.4;cursor:default}
.mobile .qcard{background:#fff;border:1px solid #d0d8f0;border-radius:10px;padding:1rem;margin-bottom:.85rem}
.mobile .qtag{display:inline-block;padding:2px 9px;border-radius:20px;font-size:10px;font-weight:600;margin-bottom:8px}
.mobile .qtag.p{background:#e6f4ea;color:#2d7a4a}
.mobile .qtag.n{background:#fce8e6;color:#c0392b}
.mobile .qtag.q{background:#e8f0fe;color:#2a4fa8}
.mobile .qprompt{font-size:13px;color:#1a1a2e;margin-bottom:10px;line-height:1.5}
.mobile .opts{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:7px}
.mobile .opt{padding:9px 10px;border-radius:8px;border:1px solid #d0d8f0;background:#fff;font-size:12px;cursor:pointer;color:#1a1a2e;font-family:inherit;text-align:left;width:100%;transition:all .15s}
.mobile .opt:hover:not(:disabled){background:#e8f0fe}
.mobile .opt.ok{background:#e6f4ea;border-color:#a8d5b5;color:#2d7a4a;font-weight:500}
.mobile .opt.bad{background:#fce8e6;border-color:#f5a89e;color:#c0392b}
.mobile .fb{margin-top:8px;padding:7px 12px;border-radius:8px;font-size:12px;line-height:1.5}
.mobile .fb.ok{background:#e6f4ea;color:#2d7a4a}
.mobile .fb.err{background:#fce8e6;color:#c0392b}
.mobile .tcard{background:#fff;border:1px solid #d0d8f0;border-radius:10px;padding:1rem;margin-bottom:.85rem}
.mobile .src{background:#f0f4ff;border-radius:8px;padding:8px 12px;font-size:13px;color:#1a1a2e;margin-bottom:10px;font-weight:500}
.mobile .tinput{width:100%;padding:8px 11px;border-radius:8px;border:1px solid #c0c8e8;background:#fff;font-size:13px;color:#1a1a2e;outline:none;font-family:inherit;display:block;margin-bottom:8px;transition:border-color .15s,box-shadow .15s}
.mobile .tinput:focus{border-color:#3a5a9a;box-shadow:0 0 0 3px rgba(58,90,154,.1)}
.mobile .tinput:disabled{opacity:.55}
.mobile .word-bank{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:10px;min-height:36px;padding:8px;background:#f7f9fc;border-radius:8px;border:1px dashed #c0c8e8}
.mobile .built-zone{display:flex;flex-wrap:wrap;gap:6px;min-height:36px;padding:8px;border-radius:8px;border:1.5px dashed #a8bef5;margin-bottom:8px;background:#f0f4ff}
.mobile .page-nav{display:flex;align-items:center;justify-content:space-between;margin-top:1.1rem;padding-top:.85rem;border-top:1px solid #e8edf5}
.mobile .nav-dots{display:flex;gap:6px;align-items:center}
.mobile .ndot{width:7px;height:7px;border-radius:50%;background:#d0d8f0;cursor:pointer;border:none;padding:0;transition:all .2s}
.mobile .ndot.on{background:#3a5a9a;transform:scale(1.35)}
.mobile .ndot.done{background:#a8bef5}

/* ══════════════════════
   DESKTOP — 740×400, NO scroll
══════════════════════ */
body.desktop{overflow:hidden;background:#e8edf5;display:flex;align-items:center;justify-content:center;min-height:100vh}
.desktop .frame{width:740px;height:400px;background:#f7f9fc;overflow:hidden;border-radius:12px;box-shadow:0 4px 24px rgba(0,0,0,.12);display:flex;flex-direction:column}

.desktop .dprog-fill{height:100%;background:#f5a623;border-radius:2px;transition:width .4s}
/* tab strip */

/* elements */

.desktop .subj-row{display:flex;gap:5px;align-items:center;flex-shrink:0}
.desktop .subj-label{font-size:10px;color:#888;font-weight:600}
.desktop .sbtn{padding:3px 9px;border-radius:20px;border:1px solid #d0d8f0;background:#fff;font-size:11px;cursor:pointer;color:#666;font-family:inherit;transition:all .15s}
.desktop .sbtn.on{background:#3a5a9a;color:#fff;border-color:#3a5a9a}
.desktop .new-verb-btn{margin-left:auto;padding:3px 9px;border-radius:7px;border:1px solid #d0d8f0;background:#fff;font-size:11px;cursor:pointer;color:#1a1a2e;font-family:inherit;transition:all .15s}

.desktop .fbox-big.p{background:#e6f4ea;border:1px solid #a8d5b5}
.desktop .fbox-big.n{background:#fce8e6;border:1px solid #f5a89e}
.desktop .fbox-big.q{background:#e8f0fe;border:1px solid #a8bef5}
.desktop .flabel{font-size:8px;font-weight:700;letter-spacing:.8px;text-transform:uppercase;margin-bottom:4px}
.desktop .fbox-big.p .flabel{color:#2d7a4a}
.desktop .fbox-big.n .flabel{color:#c0392b}
.desktop .fbox-big.q .flabel{color:#2a4fa8}
.desktop .fex-big{font-size:22px;font-weight:700;line-height:1.2;color:#1a1a2e;margin-bottom:3px}
.desktop .fstr{font-size:10px;color:#888}
.desktop .sc-grid-row{display:flex;gap:4px;flex:1;min-height:0}
.desktop .sc{border-radius:7px;text-align:center;cursor:pointer;transition:all .15s;border:1px solid transparent;flex:1;display:flex;flex-direction:column;justify-content:center;padding:4px}
.desktop .sc.p{background:#e6f4ea;border-color:#a8d5b5}
.desktop .sc.n{background:#fce8e6;border-color:#f5a89e}
.desktop .sc.q{background:#e8f0fe;border-color:#a8bef5}
.desktop .sc.active{transform:scale(1.04);box-shadow:0 2px 8px rgba(0,0,0,.1)}
.desktop .sc.dim{opacity:.5}
.desktop .sc-name{font-size:8px;font-weight:700;letter-spacing:.5px;text-transform:uppercase;margin-bottom:2px}
.desktop .sc.p .sc-name{color:#2d7a4a}
.desktop .sc.n .sc-name{color:#c0392b}
.desktop .sc.q .sc-name{color:#2a4fa8}
.desktop .sc-sent{font-size:10px;font-weight:600;color:#1a1a2e;line-height:1.2}
.desktop .tip{background:#fff;border-left:3px solid #f5a623;border-radius:0 7px 7px 0;padding:6px 10px;font-size:11px;color:#7a5000;line-height:1.45;flex-shrink:0}
.desktop .tip b{font-weight:600}
.desktop .btn{padding:4px 12px;border-radius:7px;border:1px solid #d0d8f0;background:#fff;font-size:11px;cursor:pointer;color:#1a1a2e;font-family:inherit;transition:all .15s}
.desktop .btn:hover:not(:disabled){background:#e8f0fe;border-color:#a8bef5}
.desktop .btn.pri{background:#3a5a9a;color:#fff;border-color:#3a5a9a}
.desktop .btn.pri:hover:not(:disabled){background:#2d4a8a}
.desktop .btn:disabled{opacity:.38;cursor:default}
.desktop .btn-row{display:flex;gap:6px;align-items:center}
.desktop .qprompt{font-size:11px;font-weight:600;color:#1a1a2e;line-height:1.4;flex-shrink:0}
.desktop .opts{display:grid;grid-template-columns:1fr 1fr;gap:4px;flex:1;min-height:0}
.desktop .opt{border-radius:7px;border:1px solid #d0d8f0;background:#fff;font-size:11px;cursor:pointer;color:#1a1a2e;font-family:inherit;text-align:left;padding:0 10px;transition:all .15s;display:flex;align-items:center}
.desktop .opt:hover:not(:disabled){background:#e8f0fe}
.desktop .opt.ok{background:#e6f4ea;border-color:#a8d5b5;color:#2d7a4a;font-weight:600}
.desktop .opt.bad{background:#fce8e6;border-color:#f5a89e;color:#c0392b}
.desktop .fb{padding:4px 10px;border-radius:7px;font-size:11px;font-weight:600;flex-shrink:0;min-height:18px}
.desktop .fb.ok{background:#e6f4ea;color:#2d7a4a}
.desktop .fb.err{background:#fce8e6;color:#c0392b}
.desktop .src{background:#f0f4ff;border-radius:7px;padding:8px 12px;font-size:15px;color:#1a1a2e;font-weight:600;flex:1;display:flex;align-items:center}

/* bottom nav bar */

.desktop .nbtn.prev:hover:not(:disabled){background:#e8f0fe}

/* ══════════════════════
   SHARED
══════════════════════ */
@keyframes fadeL{from{opacity:0;transform:translateX(28px)}to{opacity:1;transform:translateX(0)}}
@keyframes fadeR{from{opacity:0;transform:translateX(-28px)}to{opacity:1;transform:translateX(0)}}
.fl{animation:fadeL .26s cubic-bezier(.4,0,.2,1) both}
.fr{animation:fadeR .26s cubic-bezier(.4,0,.2,1) both}
#wt-back{position:fixed;inset:0;background:rgba(20,30,60,.45);z-index:1000}
#wt-hl{position:fixed;z-index:1001;border-radius:10px;pointer-events:none;transition:all .3s;box-shadow:0 0 0 4px #3a5a9a,0 0 0 8px rgba(58,90,154,.25)}
#wt-hand{position:fixed;z-index:1003;font-size:22px;pointer-events:none;animation:wbob .8s ease-in-out infinite alternate}
@keyframes wbob{from{transform:translateY(0) rotate(-12deg)}to{transform:translateY(-6px) rotate(-12deg)}}
#wt-bubble{position:fixed;z-index:1002;background:#fff;border-radius:12px;padding:14px 16px;max-width:230px;box-shadow:0 6px 24px rgba(0,0,0,.15)}
#wt-bubble h3{font-size:13px;font-weight:600;color:#1a1a2e;margin-bottom:4px}
#wt-bubble p{font-size:12px;color:#555;line-height:1.5;margin-bottom:10px}
.wt-btns{display:flex;gap:7px;align-items:center}
.wt-next{padding:5px 12px;border-radius:8px;background:#3a5a9a;color:#fff;border:none;font-size:12px;cursor:pointer;font-family:inherit;font-weight:500}
.wt-skip{padding:5px 8px;background:transparent;color:#999;border:none;font-size:11px;cursor:pointer;font-family:inherit}
.wt-dots-row{display:flex;gap:4px;margin-left:auto}
.wt-d{width:5px;height:5px;border-radius:50%;background:#ddd}
.wt-d.on{background:#3a5a9a}
</style>
</head>
<body>

<!-- MOBILE -->
<div id="mobile-shell" style="display:none">
  <div class="app">
    <h1>Simple present tense</h1>
    <p class="subtitle">Positive · Negative · Question — A1 level</p>
    <div class="score-pill">
      <span>Score <strong id="m-sc">0</strong></span>
      <span>Streak <strong id="m-st">0</strong><span class="streak-msg" id="m-stmsg"></span></span>
    </div>
    <div class="tabs" id="m-tabs"></div>
    <div class="prog-bar"><div class="prog-fill" id="m-prog" style="width:0%"></div></div>
    <div id="m-pw"></div>
  </div>
</div>

<!-- DESKTOP -->
<div id="desktop-shell" style="display:none">
  <div class="frame">
    <div class="dtop">
      <div style="display:flex;align-items:center">
        <div class="dtop-dot"></div>
        <span class="dtop-title">Simple Present Tense — A1</span>
      </div>
      <div class="d-score">
        <span>Score <strong id="d-sc">0</strong></span>
        <span>Streak <strong id="d-st">0</strong></span>
        <div class="dprog"><div class="dprog-fill" id="d-prog" style="width:0%"></div></div>
      </div>
    </div>
    <div class="dtabs" id="d-tabs"></div>
    <div class="dcontent"><div id="d-pw"></div></div>
    <div class="dnav">
      <button class="nbtn prev" id="d-prev" onclick="dGoPage(dPage-1,-1)">← Back</button>
      <div class="nav-dots" id="d-dots"></div>
      <button class="nbtn next" id="d-next" onclick="dGoPage(dPage+1,1)">Next →</button>
    </div>
  </div>
</div>

<!-- WALKTHROUGH -->
<div id="wt-back" style="display:none" onclick="wtSkip()"></div>
<div id="wt-hl"  style="display:none"></div>
<div id="wt-hand" style="display:none">👆</div>
<div id="wt-bubble" style="display:none">
  <h3 id="wt-title"></h3><p id="wt-text"></p>
  <div class="wt-btns">
    <button class="wt-next" onclick="wtNext()">Next →</button>
    <button class="wt-skip" onclick="wtSkip()">Skip</button>
    <div class="wt-dots-row" id="wt-dots"></div>
  </div>
</div>

<script>
/* ── DETECT ── */
const ua=navigator.userAgent||'';
const vw=window.innerWidth||screen.width;
const isTouch=('ontouchstart' in window)||navigator.maxTouchPoints>1;
const isMobile=/Android|iPhone|iPad|iPod|BlackBerry|IEMobile|Opera Mini|Mobile|Tablet/i.test(ua)||vw<768||(isTouch&&vw<1024);
document.body.classList.add(isMobile?'mobile':'desktop');
document.getElementById(isMobile?'mobile-shell':'desktop-shell').style.display='block';

/* ── SHARED DATA ── */
const VERBS=[
  {b:'work',s:'works'},{b:'play',s:'plays'},{b:'eat',s:'eats'},{b:'drink',s:'drinks'},
  {b:'study',s:'studies'},{b:'watch',s:'watches'},{b:'cook',s:'cooks'},{b:'walk',s:'walks'},
  {b:'sleep',s:'sleeps'},{b:'read',s:'reads'},{b:'listen',s:'listens'},{b:'help',s:'helps'},
  {b:'call',s:'calls'},{b:'open',s:'opens'},{b:'wash',s:'washes'},{b:'visit',s:'visits'},
  {b:'learn',s:'learns'},{b:'talk',s:'talks'},{b:'live',s:'lives'},{b:'run',s:'runs'},
];
const SUBJS=['I','you','he','we','they'];
const posF=(s,v)=>s==='he'?`${s} ${v.s}`:`${s} ${v.b}`;
const negF=(s,v)=>s==='he'?`${s} doesn't ${v.b}`:`${s} don't ${v.b}`;
const queF=(s,v)=>s==='he'?`Does ${s} ${v.b}?`:`Do ${s} ${v.b}?`;
const spF=s=>s==='he'?'he/she + verb-s':'subject + verb';
const snF=s=>s==='he'?"he/she + doesn't + verb":"subject + don't + verb";
const sqF=s=>s==='he'?'Does + he/she + verb?':'Do + subject + verb?';
const TIPS={
  I:'<b>I</b> never adds -s. Say <b>I work</b>, NOT <b>I works</b>.',
  you:'<b>You</b> never adds -s. Say <b>you work</b>, NOT <b>you works</b>.',
  he:'<b>He/she/it</b> always gets <b>-s</b>! Say <b>he works</b>. But: <b>he doesn\'t work</b> — no -s after doesn\'t!',
  we:'<b>We</b> never adds -s. Say <b>we work</b>, NOT <b>we works</b>.',
  they:'<b>They</b> never adds -s. Say <b>they work</b>, NOT <b>they works</b>.',
};
const rand=a=>a[Math.floor(Math.random()*a.length)];
const norm=s=>s.toLowerCase().replace(/[?.!]/g,'').trim();

function exploreCore(form,curS,curV,pre){
  const cls=form==='positive'?'p':form==='negative'?'n':'q';
  const label=form==='positive'?'Positive':form==='negative'?'Negative':'Question';
  const ex=form==='positive'?posF(curS,curV):form==='negative'?negF(curS,curV):queF(curS,curV);
  const str=form==='positive'?spF(curS):form==='negative'?snF(curS):sqF(curS);
  const note=form==='positive'
    ?'<b>Positive:</b> for habits &amp; facts. <b>He/she/it</b> gets a special <b>-s</b> ending!'
    :form==='negative'
    ?'<b>Negative:</b> use <b>don\'t</b> (I/you/we/they) or <b>doesn\'t</b> (he/she/it) + base verb.'
    :'<b>Question:</b> use <b>Do</b> (I/you/we/they) or <b>Does</b> (he/she/it) + subject + verb?';
  const sbtns=SUBJS.map(s=>`<button class="sbtn${s===curS?' on':''}" onclick="${pre}SetSubj('${s}','${form}')">${s==='he'?'he/she':s}</button>`).join('');
  const grid=SUBJS.map(s=>{
    const e2=form==='positive'?posF(s,curV):form==='negative'?negF(s,curV):queF(s,curV);
    return `<div class="sc ${cls}${s===curS?' active':' dim'}" onclick="${pre}SetSubj('${s}','${form}')"><div class="sc-name">${s==='he'?'he/she':s}</div><div class="sc-sent">${e2}</div></div>`;
  }).join('');
  return {cls,label,ex,str,note,sbtns,grid};
}

  let mTrS={};

  let mBldS={};
  function mBuild(){
    const s=rand(SUBJS),v=rand(VERBS),ft=rand(['pos','neg','q']);const correct=ft==='pos'?posF(s,v):ft==='neg'?negF(s,v):queF(s,v);mBldS={correct,isQ:ft==='q'};const words=correct.replace('?','').split(' ');const sc=[...words].sort(()=>Math.random()-.5);const cls=ft==='pos'?'p':ft==='neg'?'n':'q';const lbl=ft==='pos'?'positive':ft==='neg'?'negative':'question';
    return `<div class="tcard"><p style="font-size:11px;color:#888;margin-bottom:8px">Order the words — make a <span class="qtag ${cls}">${lbl}</span> sentence:</p><div class="word-bank" id="m-bbnk">${sc.map((w,i)=>`<button class="btn" data-i="${i}" data-w="${w}">${w}</button>`).join('')}</div><p style="font-size:11px;color:#888;margin-bottom:5px">Your sentence:</p><div class="built-zone" id="m-bblt"></div><div class="btn-row"><button class="btn pri" id="m-bchk">Check</button><button class="btn" id="m-bclr">Clear</button><button class="btn" id="m-bnew">New 🎲</button></div><div id="m-bfb"></div></div>${mNav()}`;

  let dBldS={};
  function dBuildPage(){
    const s=rand(SUBJS),v=rand(VERBS),ft=rand(['pos','neg','q']);const correct=ft==='pos'?posF(s,v):ft==='neg'?negF(s,v):queF(s,v);dBldS={correct,isQ:ft==='q'};const words=correct.replace('?','').split(' ');const sc=[...words].sort(()=>Math.random()-.5);const cls=ft==='pos'?'p':ft==='neg'?'n':'q';const lbl=ft==='pos'?'positive':ft==='neg'?'negative':'question';
    const tagBg=cls==='p'?'#e6f4ea':cls==='n'?'#fce8e6':'#e8f0fe';const tagCol=cls==='p'?'#2d7a4a':cls==='n'?'#c0392b':'#2a4fa8';
    return `<div style="font-size:11px;color:#888;flex-shrink:0">Order the words → make a <span style="display:inline-block;padding:1px 8px;border-radius:20px;font-size:10px;font-weight:600;background:${tagBg};color:${tagCol}">${lbl}</span> sentence:</div>
      <div class="word-bank" id="d-bbnk">${sc.map((w,i)=>`<button class="btn" data-i="${i}" data-w="${w}">${w}</button>`).join('')}</div>
      <div style="font-size:10px;color:#888;flex-shrink:0">Your sentence:</div>
      <div class="built-zone" id="d-bblt"></div>
      <div class="fb" id="d-bfb"></div>
      <div class="btn-row" style="flex-shrink:0"><button class="btn pri" id="d-bchk">Check</button><button class="btn" id="d-bclr">Clear</button><button class="btn" id="d-bnew">New 🎲</button></div>`;
  }
  function dBindBld(){
    document.getElementById('d-bbnk').addEventListener('click',e=>{const b=e.target.closest('button');if(!b||b.disabled||document.getElementById('d-bfb').textContent)return;b.disabled=true;b.style.opacity='.3';const pl=document.createElement('button');pl.className='btn';pl.textContent=b.dataset.w;pl.style.cssText='background:#e8f0fe;border-color:#a8bef5;font-size:11px;padding:3px 9px';pl.onclick=()=>{if(document.getElementById('d-bfb').textContent)return;pl.remove();b.disabled=false;b.style.opacity='1';};document.getElementById('d-bblt').appendChild(pl);});
    document.getElementById('d-bchk').addEventListener('click',()=>{const built=[...document.getElementById('d-bblt').querySelectorAll('button')].map(b=>b.textContent).join(' ');if(!built)return;const ans=built+(dBldS.isQ?'?':'');const ok=norm(ans)===norm(dBldS.correct);const fb=document.getElementById('d-bfb');if(ok){fb.className='fb ok';fb.textContent='✓ Perfect!';dScore(true);}else{fb.className='fb err';fb.innerHTML=`✗ Correct: <b>${dBldS.correct}</b>`;dScore(false);}});
    document.getElementById('d-bclr').addEventListener('click',()=>{if(document.getElementById('d-bfb').textContent)return;[...document.getElementById('d-bblt').querySelectorAll('button')].forEach(b=>b.click());});
    document.getElementById('d-bnew').addEventListener('click',()=>dRender(1));
  }

  dTabs();dRender(1);
  window._wtSteps=[
    {sel:'.tense-note',t:'What you\'re learning',txt:'This note explains the form. Always read it first!'},
    {sel:'.subj-row',t:'Change the subject',txt:'Click any subject — he/she/it always gets -s!'},
    {sel:'.fbox-big',t:'The main form',txt:'Big card shows the full sentence and structure.'},
    {sel:'.dtabs',t:'8 pages',txt:'Positive, Negative, Question, Subjects, Key Tip, Quiz, Transform, Build.'},
    {sel:'.dnav',t:'Navigate',txt:'Use Back/Next or click the dots below to move between pages.'},
  ];
  startWT();
}

/* ── WALKTHROUGH ── */
function startWT(){
  setTimeout(()=>{document.getElementById('wt-back').style.display='block';document.getElementById('wt-dots').innerHTML=window._wtSteps.map((_,i)=>`<div class="wt-d" id="wd${i}"></div>`).join('');wtShow(0);},600);
}
let _wtStep=0;
function wtShow(i){
  _wtStep=i;const step=window._wtSteps[i];const el=document.querySelector(step.sel);if(!el){wtNext();return;}
  document.querySelectorAll('.wt-d').forEach((d,j)=>d.classList.toggle('on',j===i));
  document.getElementById('wt-title').textContent=step.t;document.getElementById('wt-text').textContent=step.txt;
  document.querySelector('.wt-next').textContent=i===window._wtSteps.length-1?'Got it!':'Next →';
  const r=el.getBoundingClientRect(),pad=7;
  document.getElementById('wt-hl').style.cssText=`display:block;position:fixed;left:${r.left-pad}px;top:${r.top-pad}px;width:${r.width+pad*2}px;height:${r.height+pad*2}px;border-radius:10px;box-shadow:0 0 0 4px #3a5a9a,0 0 0 8px rgba(58,90,154,.25);pointer-events:none;z-index:1001`;
  document.getElementById('wt-hand').style.cssText=`display:block;position:fixed;left:${r.left+10}px;top:${r.bottom+3}px;font-size:22px;z-index:1003;pointer-events:none`;
  const bub=document.getElementById('wt-bubble');bub.style.display='block';
  let bx=r.left,by=r.bottom+42;if(bx+238>window.innerWidth-8)bx=window.innerWidth-246;if(bx<8)bx=8;if(by+155>window.innerHeight-8)by=r.top-162;if(by<8)by=8;
  bub.style.cssText=`display:block;position:fixed;left:${bx}px;top:${by}px;z-index:1002;background:#fff;border-radius:12px;padding:14px 16px;max-width:230px;box-shadow:0 6px 24px rgba(0,0,0,.15)`;
}
function wtNext(){if(_wtStep>=window._wtSteps.length-1){wtSkip();return;}wtShow(_wtStep+1);}
function wtSkip(){['wt-back','wt-hl','wt-hand','wt-bubble'].forEach(id=>{const el=document.getElementById(id);if(el)el.style.display='none';});}
</script>
