<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Simple Present Tense</title>
<style>
/* ── RESET ── */
*{box-sizing:border-box;margin:0;padding:0}
html,body{width:100%;height:100%;font-family:system-ui,sans-serif;background:#f7f9fc;color:#1a1a2e}

/* ══════════════════════════════════════
   MOBILE STYLES  (default)
══════════════════════════════════════ */
body.mobile{padding:1.5rem;overflow-y:auto;overflow-x:hidden}
.mobile .app{max-width:780px;margin:0 auto}
.mobile h1{font-size:20px;font-weight:600;color:#1a1a2e;margin-bottom:4px}

.mobile .score-pill{display:inline-flex;gap:14px;background:#e8f0fe;border-radius:20px;padding:6px 16px;margin-bottom:1.25rem}
.mobile .score-pill span{font-size:13px;color:#3a5a9a}
.mobile .score-pill strong{font-weight:600;color:#1a3a7a}
.mobile .streak-msg{font-size:12px;color:#2d7a4a;font-weight:600;margin-left:3px}
.mobile .tabs{display:flex;border-radius:10px;overflow:hidden;border:1px solid #d0d8f0;margin-bottom:1.25rem;background:#fff}

.mobile .tab.on{background:#3a5a9a;color:#fff;font-weight:500}
.mobile .prog-bar{height:4px;background:#dde5f5;border-radius:2px;margin-bottom:1.25rem;overflow:hidden}
.mobile .prog-fill{height:100%;background:#3a5a9a;border-radius:2px;transition:width .4s}
.mobile .tense-note{background:#e8f0fe;border-radius:8px;padding:10px 14px;font-size:13px;color:#3a5a9a;margin-bottom:1rem;line-height:1.6}
.mobile .tense-note b{font-weight:600;color:#1a3a7a}
.mobile .subj-row{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:1rem;align-items:center}
.mobile .subj-row label{font-size:12px;color:#888}
.mobile .sbtn{padding:5px 12px;border-radius:20px;border:1px solid #d0d8f0;background:#fff;font-size:13px;cursor:pointer;color:#666;font-family:inherit;transition:all .15s}
.mobile .sbtn.on{background:#3a5a9a;color:#fff;border-color:#3a5a9a}
.mobile .fbox-big{padding:20px 18px;border-radius:10px;margin-bottom:1rem}
.mobile .fbox-big.p{background:#e6f4ea;border:1px solid #a8d5b5}
.mobile .fbox-big.n{background:#fce8e6;border:1px solid #f5a89e}

.mobile .flabel{font-size:10px;font-weight:600;letter-spacing:.8px;text-transform:uppercase;margin-bottom:8px}
.mobile .fbox-big.p .flabel{color:#2d7a4a}
.mobile .fbox-big.n .flabel{color:#c0392b}
.mobile .fbox-big.q .flabel{color:#2a4fa8}
.mobile .fex-big{font-size:24px;font-weight:700;margin-bottom:6px;line-height:1.3;color:#1a1a2e}
.mobile .fstr{font-size:11px;color:#888}
.mobile .all-grid{display:grid;grid-template-columns:repeat(5,minmax(0,1fr));gap:8px;margin-bottom:1rem}
.mobile .sc{padding:10px 4px;border-radius:8px;text-align:center;cursor:pointer;transition:all .15s;border:1px solid transparent}
.mobile .sc.p{background:#e6f4ea;border-color:#a8d5b5}
.mobile .sc.n{background:#fce8e6;border-color:#f5a89e}
.mobile .sc.q{background:#e8f0fe;border-color:#a8bef5}
.mobile .sc.active{transform:scale(1.06);box-shadow:0 2px 10px rgba(0,0,0,.1)}
.mobile .sc.dim{opacity:.52}
.mobile .sc-name{font-size:9px;font-weight:600;letter-spacing:.5px;text-transform:uppercase;margin-bottom:3px}
.mobile .sc.p .sc-name{color:#2d7a4a}
.mobile .sc.n .sc-name{color:#c0392b}
.mobile .sc.q .sc-name{color:#2a4fa8}
.mobile .sc-sent{font-size:11px;font-weight:600;color:#1a1a2e;line-height:1.3}

.mobile .tip{background:#fff;border-left:3px solid #f5a623;border-radius:0 8px 8px 0;padding:9px 14px;font-size:13px;color:#7a5000;line-height:1.6;margin-bottom:1rem}
.mobile .tip b{font-weight:600}
.mobile .btn-row{display:flex;gap:8px;flex-wrap:wrap}
.mobile .btn{padding:7px 16px;border-radius:8px;border:1px solid #d0d8f0;background:#fff;font-size:13px;cursor:pointer;color:#1a1a2e;font-family:inherit;transition:all .15s}
.mobile .btn:hover:not(:disabled){background:#e8f0fe;border-color:#a8bef5}
.mobile .btn.pri{background:#3a5a9a;color:#fff;border-color:#3a5a9a}
.mobile .btn.pri:hover:not(:disabled){background:#2d4a8a}
.mobile .btn:disabled{opacity:.4;cursor:default}
.mobile .qcard{background:#fff;border:1px solid #d0d8f0;border-radius:12px;padding:1.25rem;margin-bottom:1rem}
.mobile .qtag{display:inline-block;padding:3px 10px;border-radius:20px;font-size:11px;font-weight:600;margin-bottom:10px}
.mobile .qtag.p{background:#e6f4ea;color:#2d7a4a}
.mobile .qtag.n{background:#fce8e6;color:#c0392b}
.mobile .qtag.q{background:#e8f0fe;color:#2a4fa8}
.mobile .qprompt{font-size:15px;color:#1a1a2e;margin-bottom:14px;line-height:1.6}

.mobile .opt:hover:not(:disabled){background:#e8f0fe}

.mobile .tinput{width:100%;padding:10px 12px;border-radius:8px;border:1px solid #c0c8e8;background:#fff;font-size:14px;color:#1a1a2e;outline:none;font-family:inherit;display:block;margin-bottom:10px;transition:border-color .15s,box-shadow .15s}
.mobile .tinput:focus{border-color:#3a5a9a;box-shadow:0 0 0 3px rgba(58,90,154,.1)}
.mobile .tinput:disabled{opacity:.55}
.mobile .word-bank{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:14px;min-height:42px;padding:10px;background:#f7f9fc;border-radius:8px;border:1px dashed #c0c8e8}

.desktop .tb-dot{width:clamp(7px,1vw,13px);height:clamp(7px,1vw,13px);border-radius:50%;background:#f5a623;flex-shrink:0}
.desktop .tb-title{font-size:clamp(11px,1.4vw,17px);font-weight:700;color:#fff}
.desktop .tb-sub{font-size:clamp(9px,1vw,13px);color:rgba(255,255,255,.65);font-weight:600}
.desktop .content{flex:1;display:flex;flex-direction:column;padding:clamp(10px,1.8vh,22px) clamp(16px,2.5vw,36px);gap:clamp(8px,1.4vh,16px);overflow:hidden}
.desktop .tense-note{background:#e8f0fe;border-radius:8px;padding:clamp(7px,1.1vh,13px) clamp(10px,1.6vw,18px);font-size:clamp(10px,1.15vw,15px);color:#3a5a9a;line-height:1.55;flex-shrink:0}
.desktop .tense-note b{font-weight:700;color:#1a3a7a}
.desktop .subj-row{display:flex;gap:clamp(5px,.8vw,10px);align-items:center;flex-shrink:0}
.desktop .subj-label{font-size:clamp(9px,.95vw,13px);color:#888;font-weight:600}
.desktop .sbtn{padding:clamp(4px,.65vh,7px) clamp(10px,1.4vw,16px);border-radius:20px;border:1px solid #d0d8f0;background:#fff;font-size:clamp(9px,1vw,14px);cursor:pointer;color:#666;font-family:inherit;transition:all .15s;font-weight:500}

.desktop .fbox-big.n{background:#fce8e6;border:1px solid #f5a89e}
.desktop .fbox-big.q{background:#e8f0fe;border:1px solid #a8bef5}
.desktop .flabel{font-size:clamp(9px,.9vw,12px);font-weight:700;letter-spacing:.9px;text-transform:uppercase;margin-bottom:clamp(6px,1vh,12px)}
.desktop .fbox-big.p .flabel{color:#2d7a4a}
.desktop .fbox-big.n .flabel{color:#c0392b}
.desktop .fbox-big.q .flabel{color:#2a4fa8}
.desktop .fex-big{font-size:clamp(24px,3.8vw,54px);font-weight:700;margin-bottom:clamp(5px,.8vh,10px);line-height:1.15;color:#1a1a2e}

.desktop .all-grid{display:grid;grid-template-columns:repeat(5,1fr);gap:clamp(6px,1vw,12px);flex:1;min-height:0}
.desktop .sc{padding:clamp(8px,1.3vh,16px) clamp(6px,1vw,12px);border-radius:10px;text-align:center;cursor:pointer;transition:all .18s;border:1px solid transparent;display:flex;flex-direction:column;justify-content:center}
.desktop .sc.p{background:#e6f4ea;border-color:#a8d5b5}
.desktop .sc.n{background:#fce8e6;border-color:#f5a89e}
.desktop .sc.q{background:#e8f0fe;border-color:#a8bef5}

.desktop .sc.dim{opacity:.5}

.desktop .tip-bar{background:#fff;border-left:3px solid #f5a623;border-radius:0 8px 8px 0;padding:clamp(6px,1vh,12px) clamp(10px,1.6vw,18px);font-size:clamp(10px,1.05vw,14px);color:#7a5000;line-height:1.55;flex-shrink:0}

.desktop .nav-btn{padding:clamp(5px,.8vh,9px) clamp(14px,2vw,22px);border-radius:8px;border:none;font-family:inherit;font-size:clamp(10px,1.1vw,14px);font-weight:600;cursor:pointer;transition:all .15s}

.desktop .page-dots{display:flex;gap:clamp(6px,.9vw,11px);align-items:center}

/* ══════════════════════════════════════
   SHARED — animations + walkthrough
══════════════════════════════════════ */
@keyframes fadeL{from{opacity:0;transform:translateX(34px)}to{opacity:1;transform:translateX(0)}}
@keyframes fadeR{from{opacity:0;transform:translateX(-34px)}to{opacity:1;transform:translateX(0)}}
.fl{animation:fadeL .32s cubic-bezier(.4,0,.2,1) both}
.fr{animation:fadeR .32s cubic-bezier(.4,0,.2,1) both}

#wt-back{position:fixed;inset:0;background:rgba(20,30,60,.45);z-index:1000}
#wt-hl{position:fixed;z-index:1001;border-radius:10px;pointer-events:none;transition:all .3s}
#wt-hand{position:fixed;z-index:1003;font-size:26px;pointer-events:none;animation:wbob .8s ease-in-out infinite alternate}
@keyframes wbob{from{transform:translateY(0) rotate(-12deg)}to{transform:translateY(-7px) rotate(-12deg)}}
#wt-bubble{position:fixed;z-index:1002;background:#fff;border-radius:12px;padding:16px 18px;max-width:255px;box-shadow:0 6px 24px rgba(0,0,0,.15)}
#wt-bubble h3{font-size:14px;font-weight:600;color:#1a1a2e;margin-bottom:6px}
#wt-bubble p{font-size:13px;color:#555;line-height:1.6;margin-bottom:12px}
.wt-btns{display:flex;gap:8px;align-items:center}
.wt-next{padding:6px 14px;border-radius:8px;background:#3a5a9a;color:#fff;border:none;font-size:13px;cursor:pointer;font-family:inherit;font-weight:500}
.wt-skip{padding:6px 10px;background:transparent;color:#999;border:none;font-size:12px;cursor:pointer;font-family:inherit}
.wt-dots-row{display:flex;gap:5px;margin-left:auto}
.wt-d{width:6px;height:6px;border-radius:50%;background:#ddd}
.wt-d.on{background:#3a5a9a}
</style>
</head>
<body>

<!-- MOBILE SHELL -->
<div id="mobile-shell" style="display:none">
  <div class="app">
    <h1>Simple present tense</h1>
    <p class="subtitle">Positive, negative and question forms — A1 level</p>
    <div class="score-pill">
      <span>Score <strong id="m-sc">0</strong></span>
      <span>Streak <strong id="m-st">0</strong><span class="streak-msg" id="m-stmsg"></span></span>
    </div>
    <div class="tabs" id="m-tabs"></div>
    <div class="prog-bar"><div class="prog-fill" id="m-prog" style="width:0%"></div></div>
    <div id="m-pw"></div>
  </div>
</div>

<!-- DESKTOP SHELL -->
<div id="desktop-shell" style="display:none">
  <div class="stage">
    <div class="frame" id="d-frame">
      <div id="d-slot"></div>
    </div>
  </div>
</div>

<!-- SHARED WALKTHROUGH -->
<div id="wt-back"   style="display:none" onclick="wtSkip()"></div>
<div id="wt-hl"    style="display:none"></div>
<div id="wt-hand"  style="display:none">👆</div>
<div id="wt-bubble" style="display:none">
  <h3 id="wt-title"></h3>
  <p  id="wt-text"></p>
  <div class="wt-btns">
    <button class="wt-next" onclick="wtNext()">Next →</button>
    <button class="wt-skip" onclick="wtSkip()">Skip</button>
    <div class="wt-dots-row" id="wt-dots"></div>
  </div>
</div>

<script>
/* ══════════════════════════════════════
   DEVICE DETECTION
══════════════════════════════════════ */
const ua       = navigator.userAgent || '';
const vw       = window.innerWidth || screen.width;
const isTouch  = ('ontouchstart' in window) || navigator.maxTouchPoints > 1;
const isMobile = /Android|iPhone|iPad|iPod|BlackBerry|IEMobile|Opera Mini|Mobile|Tablet/i.test(ua)
                 || vw < 768
                 || (isTouch && vw < 1024);

document.body.classList.add(isMobile ? 'mobile' : 'desktop');
document.getElementById(isMobile ? 'mobile-shell' : 'desktop-shell').style.display = 'block';

/* ══════════════════════════════════════
   SHARED DATA
══════════════════════════════════════ */
const VERBS = [
  {b:'work',s:'works'},{b:'play',s:'plays'},{b:'eat',s:'eats'},{b:'drink',s:'drinks'},
  {b:'study',s:'studies'},{b:'watch',s:'watches'},{b:'cook',s:'cooks'},{b:'walk',s:'walks'},
  {b:'sleep',s:'sleeps'},{b:'read',s:'reads'},{b:'listen',s:'listens'},{b:'help',s:'helps'},
  {b:'call',s:'calls'},{b:'open',s:'opens'},{b:'wash',s:'washes'},{b:'visit',s:'visits'},
  {b:'learn',s:'learns'},{b:'talk',s:'talks'},{b:'live',s:'lives'},{b:'run',s:'runs'},
];
const SUBJS = ['I','you','he','we','they'];

const posF = (s,v) => s==='he' ? `${s} ${v.s}` : `${s} ${v.b}`;
const negF = (s,v) => s==='he' ? `${s} doesn't ${v.b}` : `${s} don't ${v.b}`;
const queF = (s,v) => s==='he' ? `Does ${s} ${v.b}?` : `Do ${s} ${v.b}?`;
const spF  = s => s==='he' ? 'he/she + verb-s' : 'subject + verb';
const snF  = s => s==='he' ? "he/she + doesn't + verb" : "subject + don't + verb";
const sqF  = s => s==='he' ? 'Does + he/she + verb?' : 'Do + subject + verb?';

const TIPS = {
  I:    '<b>I</b> never adds -s. Say <b>I work</b>, NOT <b>I works</b>.',
  you:  '<b>You</b> never adds -s. Say <b>you work</b>, NOT <b>you works</b>.',
  he:   '<b>He/she/it</b> always gets <b>-s</b>! Say <b>he works</b>. But: <b>he doesn\'t work</b> — no -s after doesn\'t!',
  we:   '<b>We</b> never adds -s. Say <b>we work</b>, NOT <b>we works</b>.',
  they: '<b>They</b> never adds -s. Say <b>they work</b>, NOT <b>they works</b>.',
};


const rand = a => a[Math.floor(Math.random() * a.length)];
const norm = s => s.toLowerCase().replace(/[?.!]/g,'').trim();

/* shared explore snippet */
function exploreCardHTML(form, curS, curV, prefix) {
  const cls   = form==='positive'?'p':form==='negative'?'n':'q';
  const label = form==='positive'?'Positive':form==='negative'?'Negative':'Question';
  const mainEx  = form==='positive'?posF(curS,curV):form==='negative'?negF(curS,curV):queF(curS,curV);
  const mainStr = form==='positive'?spF(curS):form==='negative'?snF(curS):sqF(curS);
  const note =
    form==='positive' ? '<b>Simple present — positive:</b> habits, routines and facts. <b>He/she/it</b> gets a special <b>-s</b> ending!' :
    form==='negative' ? '<b>Simple present — negative:</b> use <b>don\'t</b> (I/you/we/they) or <b>doesn\'t</b> (he/she/it) + base verb.' :
                        '<b>Simple present — question:</b> use <b>Do</b> (I/you/we/they) or <b>Does</b> (he/she/it) before the subject.';
  const sbtns = SUBJS.map(s =>
    `<button class="sbtn${s===curS?' on':''}" onclick="${prefix}SetSubj('${s}','${form}')">${s==='he'?'he / she':s}</button>`
  ).join('');
  const grid = SUBJS.map(s => {
    const ex = form==='positive'?posF(s,curV):form==='negative'?negF(s,curV):queF(s,curV);
    return `<div class="sc ${cls}${s===curS?' active':' dim'}" onclick="${prefix}SetSubj('${s}','${form}')">
      <div class="sc-name">${s==='he'?'he/she':s}</div>
      <div class="sc-sent">${ex}</div>
    </div>`;
  }).join('');
  return {cls, label, mainEx, mainStr, note, sbtns, grid};
}

/* ══════════════════════════════════════
   MOBILE LOGIC
══════════════════════════════════════ */
if (isMobile) {
  const M_PAGES = [
    {id:'positive',label:'Positive ✚'},
    {id:'negative',label:'Negative −'},
    {id:'question',label:'Question ?'},
    {id:'quiz',    label:'Quiz'},
    {id:'transform',label:'Transform'},
    {id:'build',   label:'Build'},
  ];
  let mPage=0, mS='I', mV=VERBS[0], score=0, streak=0, totalAns=0;

  function mUpdScore(){
    document.getElementById('m-sc').textContent=score;
    document.getElementById('m-st').textContent=streak;
    document.getElementById('m-stmsg').textContent=streak>=5?' 🔥':streak>=3?' 👏':'';
    const pct=totalAns>0?Math.min(100,Math.round(score/totalAns*100)):0;
    document.getElementById('m-prog').style.width=pct+'%';
  }
  function mOnScore(ok){totalAns++;if(ok){score++;streak++;}else streak=0;mUpdScore();}

  function mBuildTabs(){
    document.getElementById('m-tabs').innerHTML=M_PAGES.map((p,i)=>
      `<button class="tab${i===mPage?' on':''}" onclick="mGoPage(${i},${i>mPage?1:-1})">${p.label}</button>`
    ).join('');
  }

  function mNavHTML(){
    const dots=M_PAGES.map((p,i)=>
      `<button class="ndot${i===mPage?' on':i<mPage?' done':''}" onclick="mGoPage(${i},${i>mPage?1:-1})" title="${p.label}"></button>`
    ).join('');
    return `<div class="page-nav">
      <button class="btn"${mPage===0?' disabled':''} onclick="mGoPage(${mPage-1},-1)">← Back</button>
      <div class="nav-dots">${dots}</div>
      <button class="btn pri"${mPage===M_PAGES.length-1?' disabled':''} onclick="mGoPage(${mPage+1},1)">Next →</button>
    </div>`;
  }

  function mGoPage(idx,dir){
    if(idx<0||idx>=M_PAGES.length)return;
    mPage=idx; mBuildTabs(); mRender(dir===undefined?1:dir);
  }

  function mRender(dir){
    const pw=document.getElementById('m-pw');
    const div=document.createElement('div');
    const pid=M_PAGES[mPage].id;
    if(['positive','negative','question'].includes(pid)) div.innerHTML=mExploreHTML(pid);
    else if(pid==='quiz')      div.innerHTML=mQuizHTML();
    else if(pid==='transform') div.innerHTML=mTransformHTML();
    else                       div.innerHTML=mBuildHTML();
    pw.innerHTML=''; pw.appendChild(div);
    requestAnimationFrame(()=>div.classList.add(dir>=0?'fl':'fr'));
    if(pid==='quiz')      mBindQuiz();
    if(pid==='transform') mBindTransform();
    if(pid==='build')     mBindBuild();
  }

  function mExploreHTML(form){
    const {cls,label,mainEx,mainStr,note,sbtns,grid} = exploreCardHTML(form, mS, mV, 'm');
    return `
      <div class="tense-note">${note}</div>
      <div class="subj-row"><label>Subject:</label>${sbtns}</div>
      <div class="fbox-big ${cls}">
        <div class="flabel">${label}</div>
        <div class="fex-big">${mainEx}</div>
        <div class="fstr">${mainStr}</div>
      </div>
      <div class="all-grid">${grid}</div>
      <div class="tip">${TIPS[mS]}</div>
      <div class="btn-row"><button class="btn" onclick="mNewVerb()">New verb 🎲</button></div>
      ${mNavHTML()}`;
  }
  window.mSetSubj = function(s){ mS=s; mRender(0); };
  window.mNewVerb = function(){ mV=rand(VERBS); mRender(0); };

  let mQState={};
  function mQuizHTML(){
    const s=rand(SUBJS),v=rand(VERBS),ft=rand(['pos','neg','q']);
    const correct=ft==='pos'?posF(s,v):ft==='neg'?negF(s,v):queF(s,v);
    let ws=new Set();
    while(ws.size<3){const w=ft==='pos'?posF(rand(SUBJS),rand(VERBS)):ft==='neg'?negF(rand(SUBJS),rand(VERBS)):queF(rand(SUBJS),rand(VERBS));if(w!==correct)ws.add(w);}
    const opts=[correct,...ws].sort(()=>Math.random()-.5);
    mQState={correct};
    const cls=ft==='pos'?'p':ft==='neg'?'n':'q';
    const lbl=ft==='pos'?'positive':ft==='neg'?'negative':'question';
    return `<div class="qcard">
      <span class="qtag ${cls}">${lbl}</span>
      <div class="qprompt">Make the <b>${lbl}</b> form of <b>"${v.b}"</b> with <b>"${s}"</b>:</div>
      <div class="opts" id="m-qopts">
        ${opts.map(o=>`<button class="opt" data-o="${o.replace(/"/g,'&quot;')}">${o}</button>`).join('')}
      </div>
      <div id="m-qfb"></div>
    </div>
    <div id="m-qnr" style="display:none;margin-top:4px">
      <button class="btn pri" onclick="mRender(1)">Next question →</button>
    </div>
    ${mNavHTML()}`;
  }
  function mBindQuiz(){
    document.querySelectorAll('#m-qopts .opt').forEach(b=>{
      b.addEventListener('click',function(){
        if(document.querySelector('#m-qopts .ok,#m-qopts .bad'))return;
        const chosen=this.dataset.o,{correct}=mQState;
        document.querySelectorAll('#m-qopts .opt').forEach(x=>{x.disabled=true;if(x.dataset.o===correct)x.classList.add('ok');else if(x===this&&chosen!==correct)x.classList.add('bad');});
        const fb=document.getElementById('m-qfb');
        if(chosen===correct){fb.className='fb ok';fb.textContent='Well done! Correct!';mOnScore(true);}
        else{fb.className='fb err';fb.innerHTML=`Not quite — answer: <b>${correct}</b>`;mOnScore(false);}
        document.getElementById('m-qnr').style.display='block';
      });
    });
  }

  let mTrState={};
  function mTransformHTML(){
    const s=rand(SUBJS),v=rand(VERBS);
    const tasks=[
      {from:'positive',to:'negative',src:posF(s,v),ans:negF(s,v),hint:snF(s)},
      {from:'positive',to:'question',src:posF(s,v),ans:queF(s,v),hint:sqF(s)},
      {from:'negative',to:'positive',src:negF(s,v),ans:posF(s,v),hint:spF(s)},
      {from:'question',to:'positive',src:queF(s,v),ans:posF(s,v),hint:spF(s)},
    ];
    const t=rand(tasks); mTrState={ans:t.ans,hint:t.hint};
    const tc=f=>f==='positive'?'p':f==='negative'?'n':'q';
    return `<div class="tcard">
      <p style="font-size:12px;color:#888;margin-bottom:8px">Change <span class="qtag ${tc(t.from)}">${t.from}</span> → <span class="qtag ${tc(t.to)}">${t.to}</span></p>
      <div class="src">${t.src}</div>
      <input id="m-tri" class="tinput" placeholder="Write the ${t.to} form…">
      <div class="btn-row">
        <button class="btn pri" id="m-trck">Check</button>
        <button class="btn" id="m-trht">Hint</button>
        <button class="btn" id="m-trnw" style="display:none">New →</button>
      </div>
      <div id="m-trhb" style="display:none;margin-top:8px;font-size:12px;color:#888">Structure: <b>${t.hint}</b></div>
      <div id="m-trfb"></div>
    </div>${mNavHTML()}`;
  }
  function mBindTransform(){
    const inp=document.getElementById('m-tri');
    setTimeout(()=>inp&&inp.focus(),60);
    document.getElementById('m-trck').addEventListener('click',()=>{
      const v=inp.value.trim();if(!v||inp.disabled)return;
      inp.disabled=true;
      const ok=norm(v)===norm(mTrState.ans);
      const fb=document.getElementById('m-trfb');fb.style.marginTop='8px';
      if(ok){fb.className='fb ok';fb.textContent='Excellent! Correct!';mOnScore(true);}
      else{fb.className='fb err';fb.innerHTML=`Not quite. Answer: <b>${mTrState.ans}</b>`;mOnScore(false);}
      document.getElementById('m-trnw').style.display='inline-block';
    });
    inp.addEventListener('keydown',e=>{if(e.key==='Enter')document.getElementById('m-trck').click();});
    document.getElementById('m-trht').addEventListener('click',()=>{document.getElementById('m-trhb').style.display='block';});
    document.getElementById('m-trnw').addEventListener('click',()=>mRender(1));
  }

  let mBldState={};
  function mBuildHTML(){
    const s=rand(SUBJS),v=rand(VERBS),ft=rand(['pos','neg','q']);
    const correct=ft==='pos'?posF(s,v):ft==='neg'?negF(s,v):queF(s,v);
    mBldState={correct,isQ:ft==='q'};
    const words=correct.replace('?','').split(' ');
    const sc=[...words].sort(()=>Math.random()-.5);
    const cls=ft==='pos'?'p':ft==='neg'?'n':'q';
    const lbl=ft==='pos'?'positive':ft==='neg'?'negative':'question';
    return `<div class="tcard">
      <p style="font-size:13px;color:#888;margin-bottom:10px">Put the words in order — make a <span class="qtag ${cls}">${lbl}</span> sentence:</p>
      <div class="word-bank" id="m-bbnk">
        ${sc.map((w,i)=>`<button class="btn" data-i="${i}" data-w="${w}" style="font-size:14px;padding:5px 11px">${w}</button>`).join('')}
      </div>
      <p style="font-size:12px;color:#888;margin-bottom:6px">Your sentence:</p>
      <div class="built-zone" id="m-bblt"></div>
      <div class="btn-row">
        <button class="btn pri" id="m-bchk">Check</button>
        <button class="btn" id="m-bclr">Clear</button>
        <button class="btn" id="m-bnew">New 🎲</button>
      </div>
      <div id="m-bfb"></div>
    </div>${mNavHTML()}`;
  }
  function mBindBuild(){
    document.getElementById('m-bbnk').addEventListener('click',e=>{
      const b=e.target.closest('button');
      if(!b||b.disabled||document.getElementById('m-bfb').textContent)return;
      b.disabled=true;b.style.opacity='.3';
      const pl=document.createElement('button');
      pl.className='btn';pl.textContent=b.dataset.w;
      pl.style.cssText='font-size:14px;padding:5px 11px;background:#e8f0fe;border-color:#a8bef5';
      pl.onclick=()=>{if(document.getElementById('m-bfb').textContent)return;pl.remove();b.disabled=false;b.style.opacity='1';};
      document.getElementById('m-bblt').appendChild(pl);
    });
    document.getElementById('m-bchk').addEventListener('click',()=>{
      const built=[...document.getElementById('m-bblt').querySelectorAll('button')].map(b=>b.textContent).join(' ');
      if(!built)return;
      const ans=built+(mBldState.isQ?'?':'');
      const ok=norm(ans)===norm(mBldState.correct);
      const fb=document.getElementById('m-bfb');fb.style.marginTop='8px';
      if(ok){fb.className='fb ok';fb.textContent='Perfect! Well done!';mOnScore(true);}
      else{fb.className='fb err';fb.innerHTML=`Not quite. Correct: <b>${mBldState.correct}</b>`;mOnScore(false);}
    });
    document.getElementById('m-bclr').addEventListener('click',()=>{
      if(document.getElementById('m-bfb').textContent)return;
      [...document.getElementById('m-bblt').querySelectorAll('button')].forEach(b=>b.click());
    });
    document.getElementById('m-bnew').addEventListener('click',()=>mRender(1));
  }

  mBuildTabs(); mRender(1);

  /* MOBILE WALKTHROUGH */
  const M_WT=[
    {sel:'.tense-note',t:'What you\'re learning',txt:'This note explains the form. Read it first before practising!'},
    {sel:'.subj-row',  t:'Change the subject',   txt:'Tap I, you, he/she, we or they. He/she/it is special — it always gets -s!'},
    {sel:'.fbox-big',  t:'The main form',         txt:'The large card shows the sentence for the subject and verb you selected.'},
    {sel:'.all-grid',  t:'All subjects at once',  txt:'These 5 cards show every subject together. Tap any to switch.'},
    {sel:'.tip',       t:'Common mistake!',       txt:'The most important thing to remember — many beginners get this wrong!'},
    {sel:'.page-nav',  t:'Navigate pages',        txt:'Use Next/Back or the dots to move between all 6 pages.'},
  ];
  window._wtSteps = M_WT;
  startWT();

/* ══════════════════════════════════════
   DESKTOP LOGIC
══════════════════════════════════════ */
} else {
  const D_PAGES=[
    {id:'positive',next:'green'},
    {id:'negative',next:'red'},
    {id:'question',next:''},
  ];
  let dPage=0, dS='I', dV=VERBS[0];

  function dGoPage(idx,dir){
    if(idx<0||idx>=D_PAGES.length)return;
    dPage=idx; dRender(dir===undefined?1:dir);
  }
  window.dGoPage = dGoPage;

  function dRender(dir){
    const slot=document.getElementById('d-slot');
    const div=document.createElement('div');
    div.className='page';
    div.innerHTML=dPageHTML(D_PAGES[dPage].id);
    slot.innerHTML=''; slot.appendChild(div);
    requestAnimationFrame(()=>div.classList.add(dir>=0?'fl':'fr'));
  }

  function dPageHTML(form){
    const {cls,label,mainEx,mainStr,note,sbtns,grid} = exploreCardHTML(form, dS, dV, 'd');
    const dots=D_PAGES.map((p,i)=>
      `<button class="pdot${i===dPage?' on':i<dPage?' done':''}" onclick="dGoPage(${i},${i>dPage?1:-1})"></button>`
    ).join('');
    const pg=D_PAGES[dPage];
    const nextLabel = dPage===D_PAGES.length-1 ? 'Start over ↺' : 'Next →';
    return `
      <div class="topbar">
        <div class="tb-left">
          <div class="tb-dot"></div>
          <div>
            <div class="tb-title">Simple Present — ${label}</div>
            <div class="tb-sub">A1 level · Explore all subjects</div>
          </div>
        </div>
      </div>
      <div class="content">
        <div class="tense-note">${note}</div>
        <div class="subj-row">
          <span class="subj-label">Subject:</span>
          ${sbtns}
          <button class="new-verb-btn" onclick="dNewVerb()">New verb 🎲</button>
        </div>
        <div class="fbox-big ${cls}">
          <div class="flabel">${label}</div>
          <div class="fex-big">${mainEx}</div>
          <div class="fstr">${mainStr}</div>
        </div>
        <div class="all-grid">${grid}</div>
        <div class="tip-bar">${TIPS[dS]}</div>
      </div>
      <div class="botbar">
        <button class="nav-btn nav-prev"${dPage===0?' disabled':''} onclick="dGoPage(${dPage-1},-1)">← Back</button>
        <div class="page-dots">${dots}</div>
        <button class="nav-btn nav-next ${pg.next}"${dPage===D_PAGES.length-1?' disabled':''} onclick="dGoPage(${dPage+1},1)">${nextLabel}</button>
      </div>`;
  }

  window.dSetSubj = function(s){ dS=s; dRender(0); };
  window.dNewVerb = function(){ dV=rand(VERBS); dRender(0); };

  dRender(1);

  /* DESKTOP WALKTHROUGH */
  const D_WT=[
    {sel:'.tense-note',t:'What you\'re learning',   txt:'This note tells you when to use this form. Read it first!'},
    {sel:'.subj-row',  t:'Change the subject',       txt:'Click any subject — he/she/it is special, it always gets -s!'},
    {sel:'.fbox-big',  t:'The main form',            txt:'The large card shows the full sentence and the grammar structure.'},
    {sel:'.all-grid',  t:'All 5 subjects at once',   txt:'Compare every subject side by side. Click any card to switch.'},
    {sel:'.tip-bar',   t:'Common mistake!',          txt:'The most important tip — many beginners get this wrong!'},
    {sel:'.botbar',    t:'Navigate pages',           txt:'Use Next/Back or dots to move between Positive, Negative and Question.'},
  ];
  window._wtSteps = D_WT;
  startWT();
}

/* ══════════════════════════════════════
   SHARED WALKTHROUGH ENGINE
══════════════════════════════════════ */
function startWT(){
  setTimeout(()=>{
    document.getElementById('wt-back').style.display='block';
    const hlColor = isMobile ? '#3a5a9a' : '#f5a623';
    document.getElementById('wt-hl').style.boxShadow =
      isMobile
        ? '0 0 0 4px #3a5a9a, 0 0 0 8px rgba(58,90,154,.25)'
        : '0 0 0 3px #f5a623, 0 0 0 8px rgba(245,166,35,.22)';
    document.getElementById('wt-dots').innerHTML =
      window._wtSteps.map((_,i)=>`<div class="wt-d" id="wd${i}"></div>`).join('');
    wtShow(0);
  }, 600);
}

let _wtStep=0;
function wtShow(i){
  _wtStep=i;
  const step=window._wtSteps[i];
  const el=document.querySelector(step.sel);
  if(!el){wtNext();return;}
  document.querySelectorAll('.wt-d').forEach((d,j)=>d.classList.toggle('on',j===i));
  document.getElementById('wt-title').textContent=step.t;
  document.getElementById('wt-text').textContent=step.txt;
  document.querySelector('.wt-next').textContent=i===window._wtSteps.length-1?'Got it!':'Next →';
  const r=el.getBoundingClientRect(),pad=8;
  document.getElementById('wt-hl').style.cssText=
    `display:block;position:fixed;left:${r.left-pad}px;top:${r.top-pad}px;`+
    `width:${r.width+pad*2}px;height:${r.height+pad*2}px;border-radius:10px;`+
    (isMobile
      ?'box-shadow:0 0 0 4px #3a5a9a,0 0 0 8px rgba(58,90,154,.25);'
      :'box-shadow:0 0 0 3px #f5a623,0 0 0 8px rgba(245,166,35,.22);')+
    `pointer-events:none;z-index:1001`;
  document.getElementById('wt-hand').style.cssText=
    `display:block;position:fixed;left:${r.left+12}px;top:${r.bottom+4}px;font-size:26px;z-index:1003;pointer-events:none`;
  const bub=document.getElementById('wt-bubble');
  bub.style.display='block';
  let bx=r.left,by=r.bottom+48;
  if(bx+260>window.innerWidth-10)bx=window.innerWidth-270;
  if(bx<10)bx=10;
  if(by+165>window.innerHeight-10)by=r.top-172;
  if(by<10)by=10;
  bub.style.cssText=
    `display:block;position:fixed;left:${bx}px;top:${by}px;z-index:1002;`+
    `background:#fff;border-radius:12px;padding:16px 18px;max-width:255px;box-shadow:0 6px 24px rgba(0,0,0,.15)`;
}
function wtNext(){if(_wtStep>=window._wtSteps.length-1){wtSkip();return;}wtShow(_wtStep+1);}
function wtSkip(){
  ['wt-back','wt-hl','wt-hand','wt-bubble'].forEach(id=>{
    const el=document.getElementById(id);if(el)el.style.display='none';
  });
}
</script>
</body>
</html>
