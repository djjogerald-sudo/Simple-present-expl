<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Simple Present</title>
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{width:100%;height:100%;background:#f7f9fc;font-family:system-ui,sans-serif}
  .loader{
    display:flex;flex-direction:column;align-items:center;
    justify-content:center;height:100vh;gap:14px;
  }
  .spinner{
    width:32px;height:32px;
    border:3px solid #dde5f5;border-top-color:#3a5a9a;
    border-radius:50%;animation:spin .7s linear infinite;
  }
  @keyframes spin{to{transform:rotate(360deg)}}
  p{font-size:13px;color:#888}
</style>
</head>
<body>
<div class="loader">
  <div class="spinner"></div>
  <p id="msg">Detecting your device…</p>
</div>
<script>
(function(){
  var ua      = navigator.userAgent || '';
  var vw      = window.innerWidth  || screen.width;
  var isTouch = ('ontouchstart' in window) || (navigator.maxTouchPoints > 1);
  var mobileUA = /Android|iPhone|iPad|iPod|BlackBerry|IEMobile|Opera Mini|Mobile|Tablet/i.test(ua);

  /* Decision:
     mobile  → phone/tablet UA  OR  viewport < 768 px  OR  touch + width < 1024 px
     desktop → everything else (wide screen, non-touch, laptop/monitor)            */
  var isMobile = mobileUA || vw < 768 || (isTouch && vw < 1024);

  document.getElementById('msg').textContent =
    isMobile ? 'Loading mobile version…' : 'Loading desktop version…';

  setTimeout(function(){
    window.location.replace(isMobile ? 'mobile/index.html' : 'desktop/index.html');
  }, 350);
})();
</script>
</body>
</html>
