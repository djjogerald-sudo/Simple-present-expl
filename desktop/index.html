<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Simple Present</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
html,body{width:100%;height:100%;overflow:hidden;font-family:system-ui,sans-serif;background:#1a1a2e}

/* ── 16:9 locked frame ── */
.stage{width:100vw;height:100vh;display:flex;align-items:center;justify-content:center}
.frame{
  position:relative;
  width:min(100vw, calc(100vh * 16/9));
  height:min(100vh, calc(100vw * 9/16));
  overflow:hidden;
  background:#f7f9fc;
}

/* ── page animation ── */
.page{position:absolute;inset:0;display:flex;flex-direction:column}
@keyframes fadeL{from{opacity:0;transform:translateX(36px)}to{opacity:1;transform:translateX(0)}}
@keyframes fadeR{from{opacity:0;transform:translateX(-36px)}to{opacity:1;transform:translateX(0)}}
.fl{animation:fadeL .32s cubic-bezier(.4,0,.2,1) both}
.fr{animation:fadeR .32s cubic-bezier(.4,0,.2,1) both}

/* ── topbar ── */
.topbar{
  display:flex;align-items:center;justify-content:space-between;
  background:#3a5a9a;
  padding:clamp(6px,1.1vh,12px) clamp(14px,2.2vw,28px);
  flex-shrink:0;
}
.tb-left{display:flex;align-items:center;gap:clamp(6px,1vw,14px)}
.tb-dot{width:clamp(7px,1vw,13px);height:clamp(7px,1vw,13px);border-radius:50%;background:#f5a623;flex-shrink:0}
.tb-title{font-size:clamp(11px,1.4vw,17px);font-weight:700;color:#fff}
.tb-sub{font-size:clamp(9px,1vw,13px);color:rgba(255,255,255,.65);font-weight:600}
.tb-score{
  display:flex;gap:clamp(10px,1.6vw,20px);align-items:center;
  background:rgba(255,255,255,.12);border-radius:999px;
  padding:clamp(4px,.7vh,8px) clamp(10px,1.6vw,18px);
}
.sc-item{font-size:clamp(9px,.95vw,13px);color:rgba(255,255,255,.75);font-weight:600}
.sc-item strong{color:#fff;font-size:clamp(11px,1.2vw,16px)}

/* ── content area ── */
.content{
  flex:1;display:flex;flex-direction:column;
  padding:clamp(10px,1.8vh,22px) clamp(16px,2.5vw,36px);
  gap:clamp(8px,1.4vh,16px);
  overflow:hidden;
  background:#f7f9fc;
}

/* ── note bar ── */
.tense-note{
  background:#e8f0fe;border-radius:8px;
  padding:clamp(7px,1.1vh,13px) clamp(10px,1.6vw,18px);
  font-size:clamp(10px,1.15vw,15px);color:#3a5a9a;line-height:1.55;
  flex-shrink:0;
}
.tense-note b{font-weight:700;color:#1a3a7a}

/* ── subject strip ── */
.subj-row{display:flex;gap:clamp(5px,.8vw,10px);align-items:center;flex-shrink:0}
.subj-label{font-size:clamp(9px,.95vw,13px);color:#888;font-weight:600}
.sbtn{
  padding:clamp(4px,.65vh,7px) clamp(10px,1.4vw,16px);
  border-radius:20px;border:1px solid #d0d8f0;background:#fff;
  font-size:clamp(9px,1vw,14px);cursor:pointer;color:#666;
  font-family:inherit;transition:all .15s;font-weight:500;
}
.sbtn.on{background:#3a5a9a;color:#fff;border-color:#3a5a9a}
.new-verb-btn{
  margin-left:auto;
  padding:clamp(4px,.65vh,7px) clamp(10px,1.4vw,16px);
  border-radius:8px;border:1px solid #d0d8f0;background:#fff;
  font-size:clamp(9px,1vw,13px);cursor:pointer;color:#1a1a2e;
  font-family:inherit;transition:all .15s;
}
.new-verb-btn:hover{background:#e8f0fe;border-color:#a8bef5}

/* ── big form card ── */
.fbox-big{
  padding:clamp(14px,2.4vh,30px) clamp(16px,2.6vw,36px);
  border-radius:12px;flex-shrink:0;
}
.fbox-big.p{background:#e6f4ea;border:1px solid #a8d5b5}
.fbox-big.n{background:#fce8e6;border:1px solid #f5a89e}
.fbox-big.q{background:#e8f0fe;border:1px solid #a8bef5}
.flabel{font-size:clamp(9px,.9vw,12px);font-weight:700;letter-spacing:.9px;text-transform:uppercase;margin-bottom:clamp(6px,1vh,12px)}
.fbox-big.p .flabel{color:#2d7a4a}
.fbox-big.n .flabel{color:#c0392b}
.fbox-big.q .flabel{color:#2a4fa8}
.fex-big{font-size:clamp(24px,3.8vw,54px);font-weight:700;margin-bottom:clamp(5px,.8vh,10px);line-height:1.15;color:#1a1a2e}
.fstr{font-size:clamp(10px,1vw,14px);color:#888}

/* ── all-subjects grid ── */
.all-grid{
  display:grid;grid-template-columns:repeat(5,1fr);
  gap:clamp(6px,1vw,12px);flex:1;min-height:0;
}
.sc{
  padding:clamp(8px,1.3vh,16px) clamp(6px,1vw,12px);
  border-radius:10px;text-align:center;cursor:pointer;
  transition:all .18s;border:1px solid transparent;
  display:flex;flex-direction:column;justify-content:center;
}
.sc.p{background:#e6f4ea;border-color:#a8d5b5}
.sc.n{background:#fce8e6;border-color:#f5a89e}
.sc.q{background:#e8f0fe;border-color:#a8bef5}
.sc.active{transform:scale(1.05);box-shadow:0 3px 14px rgba(0,0,0,.12)}
.sc.dim{opacity:.5}
.sc-name{font-size:clamp(8px,.85vw,12px);font-weight:700;letter-spacing:.5px;text-transform:uppercase;margin-bottom:clamp(4px,.7vh,8px)}
.sc.p .sc-name{color:#2d7a4a}
.sc.n .sc-name{color:#c0392b}
.sc.q .sc-name{color:#2a4fa8}
.sc-sent{font-size:clamp(11px,1.4vw,18px);font-weight:600;color:#1a1a2e;line-height:1.3}

/* ── rule + tip ── */
.rule-box{
  background:#fff8e6;border:1px solid #f0d080;border-radius:8px;
  padding:clamp(7px,1.1vh,14px) clamp(10px,1.6vw,18px);
  font-size:clamp(10px,1.1vw,14px);color:#7a5a00;line-height:1.65;flex-shrink:0;
}
.rule-box b{font-weight:700;color:#5a4000}
.tip-bar{
  background:#fff;border-left:3px solid #f5a623;border-radius:0 8px 8px 0;
  padding:clamp(6px,1vh,12px) clamp(10px,1.6vw,18px);
  font-size:clamp(10px,1.05vw,14px);color:#7a5000;line-height:1.55;flex-shrink:0;
}
.tip-bar b{font-weight:700}

/* ── bottom nav bar ── */
.botbar{
  display:flex;align-items:center;justify-content:space-between;
  padding:clamp(6px,1vh,12px) clamp(14px,2.2vw,28px);
  background:#1a1a2e;flex-shrink:0;
}
.nav-btn{
  padding:clamp(5px,.8vh,9px) clamp(14px,2vw,22px);
  border-radius:8px;border:none;font-family:inherit;
  font-size:clamp(10px,1.1vw,14px);font-weight:600;cursor:pointer;transition:all .15s;
}
.nav-prev{background:rgba(255,255,255,.1);color:#fff}
.nav-prev:hover:not(:disabled){background:rgba(255,255,255,.2)}
.nav-next{background:#3a5a9a;color:#fff}
.nav-next:hover:not(:disabled){background:#2d4a8a}
.nav-next.green{background:#18a558}
.nav-next.red{background:#E8322A}
.nav-btn:disabled{opacity:.28;cursor:default}
.page-dots{display:flex;gap:clamp(6px,.9vw,11px);align-items:center}
.pdot{
  width:clamp(7px,.9vw,12px);height:clamp(7px,.9vw,12px);
  border-radius:50%;background:rgba(255,255,255,.25);
  cursor:pointer;border:none;transition:all .25s;padding:0;
}
.pdot.on{background:#fff;transform:scale(1.3)}
.pdot.done{background:#f5a623}
.page-counter{font-size:clamp(9px,.9vw,12px);color:rgba(255,255,255,.4);font-weight:600}

/* ── walkthrough ── */
.wt-back{position:fixed;inset:0;background:rgba(15,20,50,.5);z-index:100}
.wt-hl{position:fixed;z-index:101;border-radius:10px;box-shadow:0 0 0 3px #f5a623,0 0 0 8px rgba(245,166,35,.22);pointer-events:none;transition:all .3s}
.wt-hand{position:fixed;z-index:103;pointer-events:none;animation:wbob .8s ease-in-out infinite alternate}
@keyframes wbob{from{transform:translateY(0) rotate(-12deg)}to{transform:translateY(-8px) rotate(-12deg)}}
.wt-bub{position:fixed;z-index:102;background:#fff;border-radius:12px;padding:clamp(12px,1.5vw,18px);max-width:min(255px,27vw);box-shadow:0 6px 26px rgba(0,0,0,.16)}
.wt-bub h3{font-size:clamp(11px,1.2vw,15px);font-weight:700;color:#1a1a2e;margin-bottom:5px}
.wt-bub p{font-size:clamp(10px,1.05vw,13px);color:#555;line-height:1.55;margin-bottom:10px}
.wt-btns{display:flex;gap:7px;align-items:center}
.wt-nxt{padding:5px 13px;border-radius:8px;background:#3a5a9a;color:#fff;border:none;font-size:clamp(10px,1.05vw,13px);cursor:pointer;font-family:inherit;font-weight:600}
.wt-skp{padding:5px 8px;background:transparent;color:#bbb;border:none;font-size:clamp(9px,.95vw,12px);cursor:pointer;font-family:inherit}
.wt-ds{display:flex;gap:5px;margin-left:auto}
.wt-d{width:6px;height:6px;border-radius:50%;background:#ddd}
.wt-d.on{background:#3a5a9a}
</style>
</head>
<body>
<div class="stage">
  <div class="frame" id="frame">
    <div id="slot"></div>
  </div>
</div>

<div class="wt-back" id="wtb" style="display:none" onclick="wtSkip()"></div>
<div class="wt-hl"   id="wth" style="display:none"></div>
<div class="wt-hand" id="wtf" style="display:none;font-size:min(2.8vw,26px)">👆</div>
<div class="wt-bub"  id="wtbub" style="display:none">
  <h3 id="wtt"></h3><p id="wtp"></p>
  <div class="wt-btns">
    <button class="wt-nxt" onclick="wtNext()">Next →</button>
    <button class="wt-skp" onclick="wtSkip()">Skip</button>
    <div class="wt-ds" id="wtds"></div>
  </div>
</div>

<script>
const VERBS=[
  {b:'work',s:'works'},{b:'play',s:'plays'},{b:'eat',s:'eats'},{b:'drink',s:'drinks'},
  {b:'study',s:'studies'},{b:'watch',s:'watches'},{b:'cook',s:'cooks'},{b:'walk',s:'walks'},
  {b:'sleep',s:'sleeps'},{b:'read',s:'reads'},{b:'listen',s:'listens'},{b:'help',s:'helps'},
  {b:'call',s:'calls'},{b:'open',s:'opens'},{b:'wash',s:'washes'},{b:'visit',s:'visits'},
  {b:'learn',s:'learns'},{b:'talk',s:'talks'},{b:'live',s:'lives'},{b:'run',s:'runs'},
];
const SUBJS=['I','you','he','we','they'];
const posF=(s,v)=>s==='he'?`${s} ${v.s}`:`${s} ${v.b}`;
const negF=(s,v)=>s==='he'?`${s} doesn't ${v.b}`:`${s} don't ${v.b}`;
const queF=(s,v)=>s==='he'?`Does ${s} ${v.b}?`:`Do ${s} ${v.b}?`;
const spF =s=>s==='he'?'he/she + verb-s':'subject + verb';
const snF =s=>s==='he'?"he/she + doesn't + verb":"subject + don't + verb";
const sqF =s=>s==='he'?'Does + he/she + verb?':'Do + subject + verb?';
const TIPS={
  I:'<b>I</b> never adds -s. Say <b>I work</b>, NOT <b>I works</b>.',
  you:'<b>You</b> never adds -s. Say <b>you work</b>, NOT <b>you works</b>.',
  he:'<b>He/she/it</b> always gets <b>-s</b>! Say <b>he works</b>. But in negatives: <b>he doesn\'t work</b> — no -s after doesn\'t!',
  we:'<b>We</b> never adds -s. Say <b>we work</b>, NOT <b>we works</b>.',
  they:'<b>They</b> never adds -s. Say <b>they work</b>, NOT <b>they works</b>.',
};
const RULES={
  I:'<b>Positive:</b> I + verb &nbsp;|&nbsp; <b>Negative:</b> I + don\'t + verb &nbsp;|&nbsp; <b>Question:</b> Do + I + verb?',
  you:'<b>Positive:</b> you + verb &nbsp;|&nbsp; <b>Negative:</b> you + don\'t + verb &nbsp;|&nbsp; <b>Question:</b> Do + you + verb?',
  he:'<b>Positive:</b> he/she + verb-s &nbsp;|&nbsp; <b>Negative:</b> he/she + doesn\'t + verb &nbsp;|&nbsp; <b>Question:</b> Does + he/she + verb?',
  we:'<b>Positive:</b> we + verb &nbsp;|&nbsp; <b>Negative:</b> we + don\'t + verb &nbsp;|&nbsp; <b>Question:</b> Do + we + verb?',
  they:'<b>Positive:</b> they + verb &nbsp;|&nbsp; <b>Negative:</b> they + don\'t + verb &nbsp;|&nbsp; <b>Question:</b> Do + they + verb?',
};
const rand=a=>a[Math.floor(Math.random()*a.length)];

/* 3 pages: positive / negative / question */
const PAGES=[
  {id:'positive',label:'Positive ✚',next:'green'},
  {id:'negative',label:'Negative −', next:'red'},
  {id:'question',label:'Question ?', next:''},
];
let curPage=0, curS='I', curV=VERBS[0];

function goPage(idx,dir){
  if(idx<0||idx>=PAGES.length)return;
  curPage=idx; render(dir===undefined?1:dir);
}

function render(dir){
  const slot=document.getElementById('slot');
  const div=document.createElement('div');
  div.className='page';
  div.innerHTML=pageHTML(PAGES[curPage].id);
  slot.innerHTML=''; slot.appendChild(div);
  requestAnimationFrame(()=>div.classList.add(dir>=0?'fl':'fr'));
}

function pageHTML(form){
  const cls  = form==='positive'?'p':form==='negative'?'n':'q';
  const label= form==='positive'?'Positive':form==='negative'?'Negative':'Question';
  const mainEx  = form==='positive'?posF(curS,curV):form==='negative'?negF(curS,curV):queF(curS,curV);
  const mainStr = form==='positive'?spF(curS):form==='negative'?snF(curS):sqF(curS);
  const note =
    form==='positive'?'<b>Simple present — positive:</b> use for habits, routines and facts. <b>He/she/it</b> gets a special <b>-s</b> ending!':
    form==='negative'?'<b>Simple present — negative:</b> use <b>don\'t</b> (I/you/we/they) or <b>doesn\'t</b> (he/she/it) + base verb.':
    '<b>Simple present — question:</b> use <b>Do</b> (I/you/we/they) or <b>Does</b> (he/she/it) before the subject.';

  const sbtns=SUBJS.map(s=>
    `<button class="sbtn${s===curS?' on':''}" onclick="setSubj('${s}','${form}')">${s==='he'?'he / she':s}</button>`
  ).join('');

  const grid=SUBJS.map(s=>{
    const ex=form==='positive'?posF(s,curV):form==='negative'?negF(s,curV):queF(s,curV);
    return `<div class="sc ${cls}${s===curS?' active':' dim'}" onclick="setSubj('${s}','${form}')">
      <div class="sc-name">${s==='he'?'he / she':s}</div>
      <div class="sc-sent">${ex}</div>
    </div>`;
  }).join('');

  /* dots */
  const dots=PAGES.map((p,i)=>`<button class="pdot${i===curPage?' on':i<curPage?' done':''}" onclick="goPage(${i},${i>curPage?1:-1})" title="${p.label}"></button>`).join('');

  const pg=PAGES[curPage];
  const prevDis=curPage===0?' disabled':'';
  const nextDis=curPage===PAGES.length-1?' disabled':'';

  return `
    <div class="topbar">
      <div class="tb-left">
        <div class="tb-dot"></div>
        <div>
          <div class="tb-title">Simple Present — ${label}</div>
          <div class="tb-sub">A1 level · Explore form</div>
        </div>
      </div>
      <div class="tb-score">
        <div class="sc-item">Page <strong>${curPage+1} / ${PAGES.length}</strong></div>
      </div>
    </div>

    <div class="content">
      <div class="tense-note">${note}</div>

      <div class="subj-row">
        <span class="subj-label">Subject:</span>
        ${sbtns}
        <button class="new-verb-btn" onclick="newVerb('${form}')">New verb 🎲</button>
      </div>

      <div class="fbox-big ${cls}">
        <div class="flabel">${label}</div>
        <div class="fex-big">${mainEx}</div>
        <div class="fstr">${mainStr}</div>
      </div>

      <div class="all-grid">${grid}</div>

      <div class="rule-box">${RULES[curS]}</div>
      <div class="tip-bar">${TIPS[curS]}</div>
    </div>

    <div class="botbar">
      <button class="nav-btn nav-prev"${prevDis} onclick="goPage(${curPage-1},-1)">← Back</button>
      <div class="page-dots">${dots}</div>
      <button class="nav-btn nav-next ${pg.next}"${nextDis} onclick="goPage(${curPage+1},1)">
        ${curPage===PAGES.length-1?'Start over ↺':'Next →'}
      </button>
    </div>`;
}

function setSubj(s,form){ curS=s; render(0); }
function newVerb(form){ curV=rand(VERBS); render(0); }

/* start-over loops back to page 0 */
document.addEventListener('click',e=>{
  if(curPage===PAGES.length-1&&e.target.classList.contains('nav-next')){
    goPage(0,1);
  }
});

/* WALKTHROUGH */
const WT=[
  {sel:'.tense-note', t:'What you\'re learning',   txt:'This tells you when to use this form. Read it before practising!'},
  {sel:'.subj-row',   t:'Change the subject',       txt:'Click any subject to see how the sentence changes. He/she/it is special — it always gets -s!'},
  {sel:'.fbox-big',   t:'The main form — big!',     txt:'This large card shows the full sentence and the grammar structure underneath.'},
  {sel:'.all-grid',   t:'All 5 subjects at once',   txt:'Compare every subject side by side. Click any card to switch to that subject.'},
  {sel:'.rule-box',   t:'Grammar rule',             txt:'The exact rule for the selected subject. Always read it!'},
  {sel:'.tip-bar',    t:'Common mistake!',           txt:'The most important tip for this subject. Many beginners get this wrong!'},
  {sel:'.botbar',     t:'Move between pages',        txt:'Use Next/Back or click the dots to move between Positive, Negative and Question.'},
];
let wtStep=0;
function wtStart(){
  document.getElementById('wtb').style.display='block';
  document.getElementById('wtds').innerHTML=WT.map((_,i)=>`<div class="wt-d" id="wd${i}"></div>`).join('');
  wtShow(0);
}
function wtShow(i){
  wtStep=i;
  const step=WT[i], el=document.querySelector(step.sel);
  if(!el){wtNext();return;}
  document.querySelectorAll('.wt-d').forEach((d,j)=>d.classList.toggle('on',j===i));
  document.getElementById('wtt').textContent=step.t;
  document.getElementById('wtp').textContent=step.txt;
  document.querySelector('.wt-nxt').textContent=i===WT.length-1?'Got it!':'Next →';
  const r=el.getBoundingClientRect(), pad=6;
  document.getElementById('wth').style.cssText=
    `display:block;position:fixed;left:${r.left-pad}px;top:${r.top-pad}px;`+
    `width:${r.width+pad*2}px;height:${r.height+pad*2}px;border-radius:10px;`+
    `box-shadow:0 0 0 3px #f5a623,0 0 0 8px rgba(245,166,35,.22);pointer-events:none;z-index:101`;
  document.getElementById('wtf').style.cssText=
    `display:block;position:fixed;left:${r.left+10}px;top:${r.bottom+4}px;`+
    `font-size:min(2.8vw,26px);z-index:103;pointer-events:none`;
  const bub=document.getElementById('wtbub'); bub.style.display='block';
  let bx=r.left, by=r.bottom+46;
  if(bx+260>window.innerWidth-8) bx=window.innerWidth-268;
  if(bx<8) bx=8;
  if(by+165>window.innerHeight-8) by=r.top-172;
  if(by<8) by=8;
  bub.style.cssText=`display:block;position:fixed;left:${bx}px;top:${by}px;z-index:102;`+
    `background:#fff;border-radius:12px;padding:clamp(12px,1.5vw,18px);`+
    `max-width:min(255px,27vw);box-shadow:0 6px 26px rgba(0,0,0,.16)`;
}
function wtNext(){if(wtStep>=WT.length-1){wtSkip();return;}wtShow(wtStep+1);}
function wtSkip(){
  ['wtb','wth','wtf','wtbub'].forEach(id=>{
    const el=document.getElementById(id);if(el)el.style.display='none';
  });
}

render(1);
setTimeout(wtStart,600);
</script>
</body>
</html>
